<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fobos SDR Scanner</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                color: #c8d0d8;
                font-family: "Segoe UI", system-ui, sans-serif;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                min-height: 100vh;
            }
            .container {
                max-width: none;
                width: 100%;
            }
            h1 {
                font-size: 1.4rem;
                font-weight: 300;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #40a0e0;
                margin-bottom: 16px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            h1 small {
                font-size: 0.8rem;
                color: #607080;
                font-weight: 400;
                letter-spacing: 0;
                text-transform: none;
            }
            .status-dot {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                margin-right: 6px;
            }
            .status-dot.idle {
                background: #505050;
            }
            .status-dot.running {
                background: #40c040;
                box-shadow: 0 0 8px #40c04088;
            }
            .status-dot.disconnected {
                background: #c04040;
                box-shadow: 0 0 8px #c0404088;
            }

            .waterfall-wrap {
                position: relative;
                background: #000;
                border: 1px solid #1a2030;
                border-radius: 6px;
                overflow: hidden;
                margin-bottom: 12px;
            }
            #waterfall {
                display: block;
                width: 100%;
                height: 600px;
                cursor: crosshair;
            }
            body.zoom-mode #waterfall,
            body.zoom-mode #scope {
                cursor: zoom-in;
            }
            .freq-scale {
                position: relative;
                height: 34px;
                margin: -4px 0 8px 0;
                border: 1px solid #1a2030;
                border-radius: 6px;
                background: #07090d;
                font-size: 10px;
                color: #8090a0;
                font-family: monospace;
                overflow: hidden;
            }
            .wf-tick {
                position: absolute;
                bottom: 0;
                width: 1px;
                height: 12px;
                background: #506070;
                transform: translateX(-0.5px);
            }
            .wf-tick-label {
                position: absolute;
                bottom: 14px;
                left: 50%;
                transform: translateX(-50%);
                color: #90a0b0;
                text-shadow: 0 1px 2px #000;
                white-space: nowrap;
            }
            .wf-tick:first-child .wf-tick-label {
                left: 0;
                transform: none;
            }
            .wf-tick:last-child .wf-tick-label {
                right: 0;
                left: auto;
                transform: none;
            }

            .controls {
                display: flex;
                flex-wrap: wrap;
                gap: 8px 16px;
                background: #10141e;
                border: 1px solid #1a2030;
                border-radius: 6px;
                padding: 14px 16px;
                margin-bottom: 12px;
                align-items: end;
            }
            .ctrl-group {
                display: flex;
                flex-direction: column;
                gap: 2px;
                flex: 1 0 80px;
                min-width: 70px;
            }
            .ctrl-group label {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #607080;
                margin-top: -10px;
            }
            .ctrl-group input,
            .ctrl-group select {
                background: #181e2a;
                border: 1px solid #2a3040;
                color: #c8d0d8;
                padding: 5px 8px;
                border-radius: 4px;
                font-size: 13px;
                outline: none;
                width: 100%;
            }
            .ctrl-group input:focus,
            .ctrl-group select:focus {
                border-color: #40a0e0;
            }
            .ctrl-group input[type="range"] {
                padding: 0;
                height: 6px;
                -webkit-appearance: none;
                appearance: none;
                background: #2a3040;
                border-radius: 3px;
                border: none;
            }
            .ctrl-group input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #40a0e0;
                cursor: pointer;
            }
            .range-val {
                font-size: 11px;
                color: #8098b0;
                text-align: right;
            }

            .btn-group {
                display: flex;
                gap: 6px;
                align-items: end;
                flex: 0 0 auto;
            }
            .btn {
                padding: 6px 18px;
                border: none;
                border-radius: 4px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.15s;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .btn-start {
                background: #1a6a30;
                color: #a0e0b0;
            }
            .btn-start:hover:not(:disabled) {
                background: #208040;
                box-shadow: 0 0 12px #20804044;
            }
            .btn-stop {
                background: #6a2020;
                color: #e0a0a0;
            }
            .btn-stop:hover:not(:disabled) {
                background: #802828;
            }
            .btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .info-bar {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #607080;
                padding: 4px 4px 8px 4px;
                flex-wrap: wrap;
                gap: 2px 16px;
            }
            .info-bar .val {
                color: #90a8c0;
            }

            .scope-wrap {
                background: #000;
                border: 1px solid #1a2030;
                border-radius: 6px;
                overflow: hidden;
                margin-bottom: 8px;
            }
            #scope {
                display: block;
                width: 100%;
                height: 135px;
                cursor: crosshair;
            }

            .info-row {
                text-align: center;
                font-size: 11px;
                color: #506070;
                padding: 4px 0;
            }

            .hover-readout {
                position: fixed;
                z-index: 10;
                display: none;
                pointer-events: none;
                padding: 4px 7px;
                border: 1px solid #2a3040;
                border-radius: 4px;
                background: rgba(8, 10, 14, 0.92);
                color: #d8e0e8;
                font: 11px/1.2 monospace;
                white-space: pre-line;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>
                <span class="status-dot idle" id="statusDot"></span>
                Fobos SDR Scanner
                <small id="statusText">disconnected</small>
            </h1>

            <div class="info-bar">
                <span>HW: <span class="val" id="infoHw">---</span></span>
                <span>FW: <span class="val" id="infoFw">---</span></span>
                <span>S/N: <span class="val" id="infoSn">---</span></span>
                <span>Scan: <span class="val" id="infoRange">---</span></span>
                <span>Steps: <span class="val" id="infoSteps">---</span></span>
                <span>Lines: <span class="val" id="infoLines">0</span></span>
            </div>

            <div class="controls">
                <div class="ctrl-group">
                    <label>Start (MHz)</label>
                    <input
                        type="number"
                        id="freqStart"
                        value="50"
                        min="50"
                        step="0.1"
                    />
                </div>
                <div class="ctrl-group">
                    <label>End (MHz)</label>
                    <input
                        type="number"
                        id="freqEnd"
                        value="2000"
                        min="0"
                        step="0.1"
                    />
                </div>
                <div class="ctrl-group">
                    <label>Converter (MHz)</label>
                    <input
                        type="number"
                        id="converterFreq"
                        value="0"
                        step="0.1"
                    />
                </div>
                <div class="ctrl-group">
                    <label>Sample Rate</label>
                    <select id="samplerate">
                        <option value="25000000">25 MHz</option>
                        <option value="50000000" selected>50 MHz</option>
                        <option value="64000000">64 MHz</option>
                    </select>
                </div>
                <div class="ctrl-group">
                    <label>BW Ratio</label>
                    <select id="bwRatio">
                        <option value="0.1">0.1</option>
                        <option value="0.2">0.2</option>
                        <option value="0.3">0.3</option>
                        <option value="0.4">0.4</option>
                        <option value="0.5">0.5</option>
                        <option value="0.7">0.7</option>
                        <option value="0.8" selected>0.8</option>
                        <option value="0.9">0.9</option>
                        <option value="1.0">1.0</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn btn-start" id="btnStart">Start</button>
                    <button class="btn btn-stop" id="btnStop" disabled>
                        Stop
                    </button>
                </div>
            </div>

            <div class="controls">
                <div class="ctrl-group">
                    <label
                        >LNA <span class="range-val" id="lnaVal">0</span></label
                    >
                    >
                    <input
                        type="range"
                        id="lnaGain"
                        min="0"
                        max="2"
                        value="0"
                        step="1"
                    />
                </div>
                <div class="ctrl-group">
                    <label
                        >VGA <span class="range-val" id="vgaVal">0</span></label
                    >
                    >
                    <input
                        type="range"
                        id="vgaGain"
                        min="0"
                        max="15"
                        value="0"
                        step="1"
                    />
                </div>
                <div class="ctrl-group">
                    <label>Direct Sampling</label>
                    <select id="directSampling">
                        <option value="0">Off (RF)</option>
                        <option value="1">On (HF)</option>
                    </select>
                </div>
                <div class="ctrl-group">
                    <label>FFT</label>
                    <select id="fftSize">
                        <option value="1024" selected>1024</option>
                        <option value="2048">2048</option>
                        <option value="4096">4096</option>
                        <option value="8192">8192</option>
                        <option value="16384">16384</option>
                        <option value="32768">32768</option>
                        <option value="65536">65536</option>
                    </select>
                </div>
                <div class="ctrl-group">
                    <label
                        >WF Min
                        <span class="range-val" id="wfMinVal">0</span></label
                    >
                    <input
                        type="range"
                        id="wfMin"
                        min="0"
                        max="400"
                        value="0"
                        step="1"
                    />
                </div>
                <div class="ctrl-group">
                    <label
                        >WF Max
                        <span class="range-val" id="wfMaxVal">15</span></label
                    >
                    <input
                        type="range"
                        id="wfMax"
                        min="1"
                        max="400"
                        value="15"
                        step="1"
                    />
                </div>
            </div>

            <div class="scope-wrap">
                <canvas id="scope"></canvas>
            </div>

            <div class="freq-scale" id="freqScale"></div>

            <div class="waterfall-wrap">
                <canvas id="waterfall"></canvas>
            </div>
            <div class="hover-readout" id="hoverReadout"></div>
        </div>

        <script>
            // ===================================================================
            //  Canvases
            // ===================================================================
            const wfCanvas = document.getElementById("waterfall");
            const wfCtx = wfCanvas.getContext("2d");
            const scCanvas = document.getElementById("scope");
            const scCtx = scCanvas.getContext("2d");

            let wfImageData = null;
            let linesCount = 0;
            let currentBins = null;
            let wfRows = [];
            let waterfallMin = 0;
            let waterfallMax = 15;
            let zoomLeft = 0;
            let zoomRight = 1;
            let lutReady = false;
            let scanRunning = false;
            let backendOnline = false;
            let scanRequestSerial = 0;
            let statusPollInFlight = false;

            function resizeCanvases() {
                const rect = wfCanvas.parentElement.getBoundingClientRect();
                const w = Math.floor(rect.width);

                wfCanvas.width = w;
                wfCanvas.height = 600;

                if (!wfImageData || wfImageData.width !== w) {
                    wfImageData = wfCtx.createImageData(w, 600);
                    for (let i = 0; i < wfImageData.data.length; i += 4) {
                        wfImageData.data[i] = 0;
                        wfImageData.data[i + 1] = 0;
                        wfImageData.data[i + 2] = 0;
                        wfImageData.data[i + 3] = 255;
                    }
                    wfCtx.putImageData(wfImageData, 0, 0);
                    if (lutReady) redrawWaterfallHistory();
                }

                scCanvas.width = w;
                scCanvas.height = 135;
            }

            window.addEventListener("resize", resizeCanvases);
            resizeCanvases();

            // ===================================================================
            //  Color map: 0..255 -> RGB
            // ===================================================================
            const colorLUT = new Uint8Array(256 * 3);
            (function buildLUT() {
                for (let v = 0; v < 256; v++) {
                    const t = v / 255;
                    let r, g, b;
                    if (t < 0.125) {
                        r = 0;
                        g = 0;
                        b = t * 8 * 0.5;
                    } else if (t < 0.25) {
                        let u = (t - 0.125) * 8;
                        r = 0;
                        g = u * 0.3;
                        b = 0.5 + u * 0.5;
                    } else if (t < 0.375) {
                        let u = (t - 0.25) * 8;
                        r = 0;
                        g = 0.3 + u * 0.7;
                        b = 1.0;
                    } else if (t < 0.5) {
                        let u = (t - 0.375) * 8;
                        r = u;
                        g = 1.0;
                        b = 1.0 - u;
                    } else if (t < 0.625) {
                        let u = (t - 0.5) * 8;
                        r = 1.0;
                        g = 1.0 - u * 0.3;
                        b = 0;
                    } else if (t < 0.75) {
                        let u = (t - 0.625) * 8;
                        r = 1.0;
                        g = 0.7 - u * 0.5;
                        b = 0;
                    } else if (t < 0.875) {
                        let u = (t - 0.75) * 8;
                        r = 1.0;
                        g = 0.2 + u * 0.5;
                        b = u * 0.4;
                    } else {
                        let u = (t - 0.875) * 8;
                        r = 1.0;
                        g = 0.7 + u * 0.3;
                        b = 0.4 + u * 0.6;
                    }
                    colorLUT[v * 3] = Math.min(255, Math.floor(r * 255));
                    colorLUT[v * 3 + 1] = Math.min(255, Math.floor(g * 255));
                    colorLUT[v * 3 + 2] = Math.min(255, Math.floor(b * 255));
                }
            })();
            lutReady = true;

            // ===================================================================
            //  Draw one complete waterfall line from uint8 array
            // ===================================================================
            function getFrequencyAxis(freqStart, freqEnd, steps) {
                return {
                    left: freqStart,
                    right: freqEnd,
                    center: (freqStart + freqEnd) / 2,
                    step:
                        steps > 0 && freqEnd > freqStart
                            ? (freqEnd - freqStart) / steps
                            : 0,
                };
            }

            function minZoomSpan(binCount) {
                if (!binCount || binCount <= 0) return 0.002;
                return Math.min(1, Math.max(4 / binCount, 0.002));
            }

            function clampZoomRange(binCount) {
                const minSpan = minZoomSpan(binCount);
                let left = Math.max(0, Math.min(1, zoomLeft));
                let right = Math.max(0, Math.min(1, zoomRight));
                if (right < left) {
                    const tmp = left;
                    left = right;
                    right = tmp;
                }

                let span = right - left;
                if (span < minSpan) {
                    const center = (left + right) * 0.5;
                    span = minSpan;
                    left = center - span * 0.5;
                    right = center + span * 0.5;
                }
                if (left < 0) {
                    right -= left;
                    left = 0;
                }
                if (right > 1) {
                    left -= right - 1;
                    right = 1;
                }
                left = Math.max(0, left);
                right = Math.min(1, right);

                zoomLeft = left;
                zoomRight = right;
                return { left, right };
            }

            function getZoomedFrequencyAxis(freqStart, freqEnd, steps, binCount) {
                const axis = getFrequencyAxis(freqStart, freqEnd, steps);
                const range = clampZoomRange(binCount);
                const span = axis.right - axis.left;
                const left = axis.left + span * range.left;
                const right = axis.left + span * range.right;
                return {
                    left,
                    right,
                    center: (left + right) * 0.5,
                    step: axis.step,
                };
            }

            function dataIndexForCanvasX(x, width, binCount, zoomRange) {
                if (!binCount || binCount <= 0 || width <= 0) return 0;
                const range = zoomRange || clampZoomRange(binCount);
                const pos = Math.max(0, Math.min(width - 1, x));
                const frac = width > 1 ? pos / (width - 1) : 0;
                const idx = Math.floor(
                    (range.left + frac * (range.right - range.left)) *
                        binCount,
                );
                return Math.max(0, Math.min(binCount - 1, idx));
            }

            function dataBinRangeForCanvasX(x, width, binCount, zoomRange) {
                if (!binCount || binCount <= 0 || width <= 0) {
                    return { first: 0, last: 1 };
                }
                const range = zoomRange || clampZoomRange(binCount);
                const span = range.right - range.left;
                const leftFrac = Math.max(0, Math.min(1, x / width));
                const rightFrac = Math.max(0, Math.min(1, (x + 1) / width));
                let first = Math.floor(
                    (range.left + leftFrac * span) * binCount,
                );
                let last = Math.ceil(
                    (range.left + rightFrac * span) * binCount,
                );
                first = Math.max(0, Math.min(binCount - 1, first));
                last = Math.max(first + 1, Math.min(binCount, last));
                return { first, last };
            }

            function dataPeakForCanvasX(data, x, width, zoomRange) {
                const binRange = dataBinRangeForCanvasX(
                    x,
                    width,
                    data.length,
                    zoomRange,
                );
                let peak = 0;
                for (let i = binRange.first; i < binRange.last; i++) {
                    if (data[i] > peak) peak = data[i];
                }
                return peak | 0;
            }

            function redrawCurrentView() {
                if (currentBins && currentBins.length) {
                    redrawWaterfallHistory();
                    drawScope(
                        currentBins,
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                }
                if (currentFreq0 && currentFreq1 && currentSteps) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                }
            }

            function formatMHz(freq) {
                const mhz = freq / 1e6;
                if (Number.isInteger(mhz)) return mhz.toFixed(0) + " MHz";
                if (Math.abs(mhz - Math.round(mhz)) < 0.0005)
                    return Math.round(mhz).toFixed(0) + " MHz";
                return mhz.toFixed(3) + " MHz";
            }

            function formatScanRange(freqStart, freqEnd) {
                const start = freqStart / 1e6;
                const end = freqEnd / 1e6;
                const span = Math.abs(end - start);
                return (
                    start.toFixed(0) +
                    " - " +
                    end.toFixed(0) +
                    " (" +
                    span.toFixed(0) +
                    ") MHz"
                );
            }

            function updateFrequencyLabels(freqStart, freqEnd, steps) {
                const axis = getZoomedFrequencyAxis(
                    freqStart,
                    freqEnd,
                    steps,
                    currentBins ? currentBins.length : 0,
                );
                const overlay = document.getElementById("freqScale");
                const span = axis.right - axis.left;
                const ticks = [
                    { pos: 0, freq: axis.left },
                    { pos: 25, freq: axis.left + span * 0.25 },
                    { pos: 50, freq: axis.center },
                    { pos: 75, freq: axis.left + span * 0.75 },
                    { pos: 100, freq: axis.right },
                ];

                overlay.replaceChildren(
                    ...ticks.map((tick) => {
                        const mark = document.createElement("div");
                        const label = document.createElement("div");
                        mark.className = "wf-tick";
                        mark.style.left = tick.pos + "%";
                        label.className = "wf-tick-label";
                        label.textContent = formatMHz(tick.freq);
                        mark.appendChild(label);
                        return mark;
                    }),
                );
            }

            function frequencyAt(canvas, clientX) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.max(
                    0,
                    Math.min(rect.width, clientX - rect.left),
                );
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                if (axis.right <= axis.left || rect.width <= 0) return null;
                return axis.left + (x / rect.width) * (axis.right - axis.left);
            }

            function receiverFrequencyFromRadio(freq) {
                if (currentConverterFreq >= 0) {
                    return freq - currentConverterFreq;
                }
                return Math.abs(-currentConverterFreq - freq);
            }

            function mapWaterfallValue(value) {
                const span = Math.max(1, waterfallMax - waterfallMin);
                const scaled = ((value - waterfallMin) * 255) / span;
                return Math.max(0, Math.min(255, Math.round(scaled)));
            }

            function writeWaterfallPixel(pix, offset, rawValue) {
                const val = mapWaterfallValue(rawValue | 0);
                pix[offset] = colorLUT[val * 3];
                pix[offset + 1] = colorLUT[val * 3 + 1];
                pix[offset + 2] = colorLUT[val * 3 + 2];
                pix[offset + 3] = 255;
            }

            function clearWaterfallPixels() {
                if (!wfImageData) return;
                const pix = wfImageData.data;
                for (let i = 0; i < pix.length; i += 4) {
                    pix[i] = 0;
                    pix[i + 1] = 0;
                    pix[i + 2] = 0;
                    pix[i + 3] = 255;
                }
            }

            function redrawWaterfallHistory() {
                if (!wfImageData) return;

                const pix = wfImageData.data;
                const w = wfImageData.width;
                const h = wfImageData.height;
                clearWaterfallPixels();

                const rows = Math.min(wfRows.length, h);
                for (let y = 0; y < rows; y++) {
                    const row = wfRows[y];
                    const n = row.length;
                    const range = clampZoomRange(n);
                    const rowOffset = y * w * 4;
                    for (let x = 0; x < w; x++) {
                        writeWaterfallPixel(
                            pix,
                            rowOffset + x * 4,
                            dataPeakForCanvasX(row, x, w, range),
                        );
                    }
                }

                wfCtx.putImageData(wfImageData, 0, 0);
            }

            function drawWaterfallLine(data, freqStart, freqEnd, steps) {
                if (!wfImageData) return;
                const pix = wfImageData.data;
                const w = wfImageData.width;
                const h = wfImageData.height;

                wfRows.unshift(data.slice());
                if (wfRows.length > h) wfRows.length = h;

                // Scroll down by 1 pixel; newest scan line is written at the top.
                pix.copyWithin(4 * w, 0, 4 * w * (h - 1));

                const topRow = 0;

                // Map data bins to canvas pixels
                const n = data.length;
                const range = clampZoomRange(n);
                for (let x = 0; x < w; x++) {
                    const bi = topRow + x * 4;
                    writeWaterfallPixel(
                        pix,
                        bi,
                        dataPeakForCanvasX(data, x, w, range),
                    );
                }

                wfCtx.putImageData(wfImageData, 0, 0);

                // Update frequency labels
                updateFrequencyLabels(freqStart, freqEnd, steps);
            }

            // ===================================================================
            //  Draw spectrum scope (most recent line)
            // ===================================================================
            const scopeHistory = [];

            function drawScope(data, freqStart, freqEnd, steps) {
                const w = scCanvas.width;
                const h = scCanvas.height;
                scCtx.fillStyle = "#000";
                scCtx.fillRect(0, 0, w, h);

                const n = data.length;
                if (n < 2) return;

                // Grid lines
                scCtx.strokeStyle = "#1a2030";
                scCtx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    const y = h * 0.2 * i;
                    scCtx.beginPath();
                    scCtx.moveTo(0, y);
                    scCtx.lineTo(w, y);
                    scCtx.stroke();
                }

                // The data is magnitude 0-255; draw the curve
                scCtx.strokeStyle = "#40c0a0";
                scCtx.lineWidth = 1.5;
                scCtx.beginPath();
                const range = clampZoomRange(n);
                for (let x = 0; x < w; x++) {
                    const v = dataPeakForCanvasX(data, x, w, range) / 255;
                    const y = h - 5 - v * (h - 10);
                    if (x === 0) scCtx.moveTo(x, y);
                    else scCtx.lineTo(x, y);
                }
                scCtx.stroke();

                // Peak dot
                let maxVal = 0,
                    maxX = 0;
                const firstBin = Math.max(0, Math.floor(range.left * n));
                const lastBin = Math.min(
                    n,
                    Math.max(firstBin + 1, Math.ceil(range.right * n)),
                );
                for (let i = firstBin; i < lastBin; i++) {
                    if (data[i] > maxVal) {
                        maxVal = data[i];
                        maxX = i;
                    }
                }
                const px =
                    ((maxX / n - range.left) /
                        Math.max(0.000001, range.right - range.left)) *
                    w;
                const py = h - 5 - (maxVal / 255) * (h - 10);
                scCtx.fillStyle = "#ff8040";
                scCtx.beginPath();
                scCtx.arc(px, py, 3, 0, 2 * Math.PI);
                scCtx.fill();
            }

            // ===================================================================
            //  SSE connection
            // ===================================================================
            let eventSource = null;
            let currentFreq0 = 0,
                currentFreq1 = 0,
                currentSteps = 0,
                currentConverterFreq = 0;

            function connectSSE() {
                if (eventSource) eventSource.close();
                eventSource = new EventSource("/api/waterfall");

                eventSource.addEventListener("line", function (e) {
                    try {
                        const data = JSON.parse(e.data);
                        const bins = data.d; // uint8 array
                        const f0 = data.f0 || 0; // start freq
                        const f1 = data.f1 || 0; // end freq
                        if (f0) currentFreq0 = f0;
                        if (f1) currentFreq1 = f1;
                        if (data.b) currentSteps = data.b;
                        currentBins = bins;

                        drawWaterfallLine(
                            bins,
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );
                        drawScope(
                            bins,
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );

                        linesCount++;
                        document.getElementById("infoLines").textContent =
                            linesCount;
                        document.getElementById("infoRange").textContent =
                            formatScanRange(currentFreq0, currentFreq1);
                        if (data.b)
                            document.getElementById("infoSteps").textContent =
                                data.b;
                    } catch (e) {
                        /* ignore parse errors */
                    }
                });

                eventSource.onerror = function () {
                    checkBackendStatus();
                };
            }

            function disconnectSSE() {
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
            }

            async function checkBackendStatus() {
                if (statusPollInFlight) return null;
                statusPollInFlight = true;
                const status = await apiGet("/api/status");
                statusPollInFlight = false;

                if (!status) {
                    updateUI(false, false);
                    disconnectSSE();
                    return null;
                }

                updateUI(!!status.scanning, true);
                if (status.scanning) {
                    if (!eventSource) connectSSE();
                } else {
                    disconnectSSE();
                }
                return status;
            }

            // ===================================================================
            //  Hover readout
            // ===================================================================
            const hoverReadout = document.getElementById("hoverReadout");

            function showHoverReadout(canvas, evt, includeLevel) {
                if (!currentFreq0 || !currentFreq1 || !currentSteps) {
                    hoverReadout.style.display = "none";
                    return;
                }

                const freq = frequencyAt(canvas, evt.clientX);
                if (freq === null) {
                    hoverReadout.style.display = "none";
                    return;
                }

                let text = formatMHz(freq);
                if (currentConverterFreq !== 0) {
                    text += "\n" + formatMHz(receiverFrequencyFromRadio(freq));
                }
                if (includeLevel && currentBins && currentBins.length) {
                    const rect = canvas.getBoundingClientRect();
                    const x = Math.max(
                        0,
                        Math.min(rect.width - 1, evt.clientX - rect.left),
                    );
                    const level = dataPeakForCanvasX(
                        currentBins,
                        x,
                        rect.width,
                    );
                    text += "\n" + level;
                }

                hoverReadout.textContent = text;
                hoverReadout.style.left = evt.clientX + 12 + "px";
                hoverReadout.style.top = evt.clientY + 12 + "px";
                hoverReadout.style.display = "block";
            }

            function hideHoverReadout() {
                hoverReadout.style.display = "none";
            }

            wfCanvas.addEventListener("mousemove", (evt) =>
                showHoverReadout(wfCanvas, evt, false),
            );
            scCanvas.addEventListener("mousemove", (evt) =>
                showHoverReadout(scCanvas, evt, true),
            );
            wfCanvas.addEventListener("mouseleave", hideHoverReadout);
            scCanvas.addEventListener("mouseleave", hideHoverReadout);

            function handleZoomWheel(evt) {
                if (!evt.shiftKey || !currentBins || !currentBins.length) {
                    return;
                }

                const rect = evt.currentTarget.getBoundingClientRect();
                if (rect.width <= 0) return;

                evt.preventDefault();
                const cursor = Math.max(
                    0,
                    Math.min(1, (evt.clientX - rect.left) / rect.width),
                );
                const range = clampZoomRange(currentBins.length);
                const anchor = range.left + cursor * (range.right - range.left);
                const factor = evt.deltaY < 0 ? 1 / 1.25 : 1.25;
                const minSpan = minZoomSpan(currentBins.length);
                let span = Math.max(
                    minSpan,
                    Math.min(1, (range.right - range.left) * factor),
                );
                let left = anchor - cursor * span;
                let right = left + span;

                if (left < 0) {
                    right -= left;
                    left = 0;
                }
                if (right > 1) {
                    left -= right - 1;
                    right = 1;
                }

                zoomLeft = Math.max(0, left);
                zoomRight = Math.min(1, right);
                redrawCurrentView();
            }

            function setZoomCursor(active) {
                document.body.classList.toggle("zoom-mode", active);
            }

            window.addEventListener("keydown", (evt) => {
                if (evt.key === "Shift") setZoomCursor(true);
            });
            window.addEventListener("keyup", (evt) => {
                if (evt.key === "Shift") setZoomCursor(false);
            });
            window.addEventListener("blur", () => setZoomCursor(false));

            wfCanvas.addEventListener("wheel", handleZoomWheel, {
                passive: false,
            });
            scCanvas.addEventListener("wheel", handleZoomWheel, {
                passive: false,
            });

            // ===================================================================
            //  API calls
            // ===================================================================
            async function apiPost(url, body) {
                try {
                    const resp = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });
                    return await resp.json();
                } catch (e) {
                    return null;
                }
            }

            async function apiGet(url) {
                try {
                    const resp = await fetch(url);
                    return await resp.json();
                } catch (e) {
                    return null;
                }
            }

            function sampleRateLabel(rate) {
                const mhz = rate / 1e6;
                const text = Number.isInteger(mhz)
                    ? mhz.toFixed(0)
                    : mhz.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
                return text + " MHz";
            }

            function syncSampleRateOptions(rates, selected) {
                const sel = document.getElementById("samplerate");
                const values = Array.isArray(rates)
                    ? [...new Set(rates.map(Number).filter((rate) => rate > 0))]
                    : [];

                if (values.length) {
                    sel.replaceChildren(
                        ...values.map((rate) => {
                            const opt = document.createElement("option");
                            opt.value = String(rate);
                            opt.textContent = sampleRateLabel(rate);
                            return opt;
                        }),
                    );
                }

                if (selected) {
                    const selectedText = String(selected);
                    if (
                        ![...sel.options].some(
                            (opt) => opt.value === selectedText,
                        )
                    ) {
                        const opt = document.createElement("option");
                        opt.value = selectedText;
                        opt.textContent = sampleRateLabel(selected);
                        sel.appendChild(opt);
                    }
                    sel.value = selectedText;
                }
            }

            function setFftSizeValue(value) {
                const sel = document.getElementById("fftSize");
                const selectedText = String(value);
                if ([...sel.options].some((opt) => opt.value === selectedText)) {
                    sel.value = selectedText;
                } else {
                    sel.value = "1024";
                }
            }

            function selectedFftSize() {
                const value = parseInt(
                    document.getElementById("fftSize").value,
                    10,
                );
                if (Number.isFinite(value)) return value;
                setFftSizeValue(1024);
                return 1024;
            }

            // ===================================================================
            //  UI
            // ===================================================================
            function updateUI(running, connected = true) {
                backendOnline = connected;
                scanRunning = connected && running;
                document.getElementById("btnStart").disabled = !connected;
                document.getElementById("btnStop").disabled = !scanRunning;
                const dot = document.getElementById("statusDot");
                if (!connected) {
                    dot.className = "status-dot disconnected";
                    document.getElementById("statusText").textContent =
                        "disconnected";
                } else {
                    dot.className =
                        "status-dot " + (running ? "running" : "idle");
                    document.getElementById("statusText").textContent = running
                        ? "scanning"
                        : "idle";
                }
            }

            function mhzInputValue(freq) {
                return (freq / 1e6)
                    .toFixed(6)
                    .replace(/0+$/, "")
                    .replace(/\.$/, "");
            }

            function applyScanPlan(plan) {
                if (!plan) return;

                zoomLeft = 0;
                zoomRight = 1;

                if (plan.freq_start !== undefined) {
                    currentFreq0 = plan.freq_start;
                    document.getElementById("freqStart").value =
                        mhzInputValue(plan.freq_start);
                }
                if (plan.freq_end !== undefined) {
                    currentFreq1 = plan.freq_end;
                    document.getElementById("freqEnd").value =
                        mhzInputValue(plan.freq_end);
                }
                if (plan.steps !== undefined) {
                    currentSteps = plan.steps;
                    document.getElementById("infoSteps").textContent =
                        plan.steps;
                }
                if (plan.converter_freq !== undefined) {
                    currentConverterFreq = plan.converter_freq;
                    document.getElementById("converterFreq").value =
                        mhzInputValue(plan.converter_freq);
                }
                if (currentFreq0 && currentFreq1 && currentSteps) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                    document.getElementById("infoRange").textContent =
                        formatScanRange(currentFreq0, currentFreq1);
                }
            }

            function buildScanRequest() {
                return {
                    freq_start: parseFloat(
                        document.getElementById("freqStart").value,
                    ),
                    freq_end: parseFloat(
                        document.getElementById("freqEnd").value,
                    ),
                    converter_freq: parseFloat(
                        document.getElementById("converterFreq").value,
                    ),
                    samplerate: parseFloat(
                        document.getElementById("samplerate").value,
                    ),
                    bw_ratio: parseFloat(
                        document.getElementById("bwRatio").value,
                    ),
                    lna_gain: parseInt(
                        document.getElementById("lnaGain").value,
                    ),
                    vga_gain: parseInt(
                        document.getElementById("vgaGain").value,
                    ),
                    direct_sampling: parseInt(
                        document.getElementById("directSampling").value,
                    ),
                    fft_size: selectedFftSize(),
                };
            }

            function clearScanDisplay() {
                linesCount = 0;
                wfRows = [];
                clearWaterfallPixels();
                if (wfImageData) wfCtx.putImageData(wfImageData, 0, 0);
            }

            async function startOrRestartScan() {
                const serial = ++scanRequestSerial;
                const result = await apiPost("/api/start", buildScanRequest());
                if (serial !== scanRequestSerial) return result;

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                } else if (result.status === "ok") {
                    applyScanPlan(result);
                    updateUI(true, true);
                    clearScanDisplay();
                    connectSSE();
                } else {
                    updateUI(false, true);
                    disconnectSSE();
                }
                return result;
            }

            async function updateBackendFftSize() {
                const result = await apiPost("/api/fft", {
                    fft_size: selectedFftSize(),
                });

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    if (result.fft_size) setFftSizeValue(result.fft_size);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                }
            }

            let gainUpdateTimer = null;
            function scheduleGainUpdate() {
                if (gainUpdateTimer) clearTimeout(gainUpdateTimer);
                gainUpdateTimer = setTimeout(async function () {
                    gainUpdateTimer = null;
                    const result = await apiPost("/api/gain", {
                        lna_gain: parseInt(
                            document.getElementById("lnaGain").value,
                        ),
                        vga_gain: parseInt(
                            document.getElementById("vgaGain").value,
                        ),
                    });
                    if (result && result.status === "ok") {
                        document.getElementById("lnaGain").value =
                            result.lna_gain;
                        document.getElementById("lnaVal").textContent =
                            result.lna_gain;
                        document.getElementById("vgaGain").value =
                            result.vga_gain;
                        document.getElementById("vgaVal").textContent =
                            result.vga_gain;
                    }
                }, 80);
            }

            document
                .getElementById("btnStart")
                .addEventListener("click", async function () {
                    await startOrRestartScan();
                });

            document
                .getElementById("btnStop")
                .addEventListener("click", async function () {
                    scanRequestSerial++;
                    const result = await apiPost("/api/stop", {});
                    if (!result) {
                        updateUI(false, false);
                        disconnectSSE();
                    } else if (result.status === "ok") {
                        updateUI(false, true);
                        disconnectSSE();
                    }
                });

            document
                .getElementById("lnaGain")
                .addEventListener("input", function () {
                    document.getElementById("lnaVal").textContent = this.value;
                    scheduleGainUpdate();
                });
            document
                .getElementById("vgaGain")
                .addEventListener("input", function () {
                    document.getElementById("vgaVal").textContent = this.value;
                    scheduleGainUpdate();
                });
            function syncWaterfallBrightness(changed) {
                const minEl = document.getElementById("wfMin");
                const maxEl = document.getElementById("wfMax");
                let minVal = parseInt(minEl.value, 10);
                let maxVal = parseInt(maxEl.value, 10);

                if (minVal >= maxVal) {
                    if (changed === "min") minVal = Math.max(0, maxVal - 1);
                    else maxVal = Math.min(400, minVal + 1);
                }

                waterfallMin = minVal;
                waterfallMax = maxVal;
                minEl.value = minVal;
                maxEl.value = maxVal;
                document.getElementById("wfMinVal").textContent = minVal;
                document.getElementById("wfMaxVal").textContent = maxVal;
                localStorage.setItem("wfMin", minVal);
                localStorage.setItem("wfMax", maxVal);
                redrawWaterfallHistory();
            }

            document
                .getElementById("wfMin")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("min"),
                );
            document
                .getElementById("wfMax")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("max"),
                );

            document
                .getElementById("fftSize")
                .addEventListener("change", async function () {
                    setFftSizeValue(this.value);
                    localStorage.setItem("fftSize", this.value);
                    await updateBackendFftSize();
                });

            // ===================================================================
            //  Init
            // ===================================================================
            (async function init() {
                const status = await apiGet("/api/status");
                if (status) {
                    document.getElementById("infoHw").textContent =
                        status.hardware || "---";
                    document.getElementById("infoFw").textContent =
                        status.firmware || "---";
                    document.getElementById("infoSn").textContent =
                        status.serial || "---";
                    if (status.steps)
                        document.getElementById("infoSteps").textContent =
                            status.steps;
                    currentSteps = status.steps || 0;
                    currentFreq0 = status.freq_start || 0;
                    currentFreq1 = status.freq_end || 0;
                    if (currentFreq0 && currentFreq1 && currentSteps)
                        updateFrequencyLabels(
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );
                    if (status.freq_start)
                        document.getElementById("freqStart").value =
                            status.freq_start / 1e6;
                    if (status.freq_end)
                        document.getElementById("freqEnd").value =
                            status.freq_end / 1e6;
                    if (status.converter_freq !== undefined) {
                        currentConverterFreq = status.converter_freq;
                        document.getElementById("converterFreq").value =
                            status.converter_freq / 1e6;
                    }
                    syncSampleRateOptions(
                        status.sample_rates,
                        status.samplerate,
                    );
                    if (status.bw_ratio) {
                        const sel = document.getElementById("bwRatio");
                        for (let opt of sel.options)
                            if (parseFloat(opt.value) === status.bw_ratio) {
                                sel.value = opt.value;
                                break;
                            }
                    }
                    if (status.lna_gain !== undefined) {
                        document.getElementById("lnaGain").value =
                            status.lna_gain;
                        document.getElementById("lnaVal").textContent =
                            status.lna_gain;
                    }
                    if (status.vga_gain !== undefined) {
                        document.getElementById("vgaGain").value =
                            status.vga_gain;
                        document.getElementById("vgaVal").textContent =
                            status.vga_gain;
                    }
                    if (status.direct_sampling !== undefined)
                        document.getElementById("directSampling").value =
                            status.direct_sampling;
                }

                /* Restore waterfall brightness from localStorage */
                const savedWfMin = localStorage.getItem("wfMin");
                const savedWfMax = localStorage.getItem("wfMax");
                if (savedWfMin !== null) {
                    document.getElementById("wfMin").value = savedWfMin;
                    document.getElementById("wfMinVal").textContent =
                        savedWfMin;
                    waterfallMin = parseInt(savedWfMin, 10);
                }
                if (savedWfMax !== null) {
                    document.getElementById("wfMax").value = savedWfMax;
                    document.getElementById("wfMaxVal").textContent =
                        savedWfMax;
                    waterfallMax = parseInt(savedWfMax, 10);
                }

                /* Restore FFT size from localStorage, then let backend status override */
                const savedFft = localStorage.getItem("fftSize");
                if (savedFft !== null) {
                    setFftSizeValue(savedFft);
                }
                if (status && status.fft_size) {
                    setFftSizeValue(status.fft_size);
                }

                if (!status) {
                    updateUI(false, false);
                } else if (status.scanning) {
                    updateUI(true, true);
                    clearScanDisplay();
                    connectSSE();
                } else {
                    await startOrRestartScan();
                }
                window.setInterval(checkBackendStatus, 2000);
            })();
        </script>
    </body>
</html>
