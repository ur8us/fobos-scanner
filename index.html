            // ===================================================================
            //  API calls
            // ===================================================================
            async function apiFetchJson(url, options = {}) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 5000);
                try {
                    const resp = await fetch(url, {
                        ...options,
                        signal: controller.signal,
                    });
                    if (!resp.ok) {
                        let payload = null;
                        let text = "";
                        try {
                            text = await resp.text();
                            payload = text ? JSON.parse(text) : null;
                        } catch (e) {
                            payload = null;
                        }
                        return {
                            ...(payload || {}),
                            status: "error",
                            http_status: resp.status,
                            message:
                                (payload && payload.message) ||
                                text ||
                                resp.statusText ||
                                "HTTP error",
                        };
                    }
                    return await resp.json();
                } catch (e) {
                    return null;
                } finally {
                    clearTimeout(timer);
                }
            }

            async function apiPost(url, body) {
                return apiFetchJson(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
            }

            async function apiGet(url) {
                return apiFetchJson(url);
            }

            function applyViewPlan(plan, clearOnViewChange) {
                if (!plan) return;

                const nextView =
                    plan.view_id !== undefined
                        ? Number(plan.view_id)
                        : currentViewId;
                const viewChanged = nextView && nextView !== currentViewId;
                if (nextView) currentViewId = nextView;

                if (plan.configured_start_hz !== undefined)
                    configuredFreq0 = Number(plan.configured_start_hz);
                else if (plan.freq_start !== undefined)
                    configuredFreq0 = Number(plan.freq_start);
                if (plan.configured_end_hz !== undefined)
                    configuredFreq1 = Number(plan.configured_end_hz);
                else if (plan.freq_end !== undefined)
                    configuredFreq1 = Number(plan.freq_end);

                if (plan.visible_start_hz !== undefined)
                    currentFreq0 = Number(plan.visible_start_hz);
                else if (plan.freq_start !== undefined)
                    currentFreq0 = Number(plan.freq_start);
                if (plan.visible_end_hz !== undefined)
                    currentFreq1 = Number(plan.visible_end_hz);
                else if (plan.freq_end !== undefined)
                    currentFreq1 = Number(plan.freq_end);

                if (plan.steps !== undefined) {
                    currentSteps = Number(plan.steps);
                }
                if (plan.rate_limit_lps !== undefined) {
                    setRateLimitValue(plan.rate_limit_lps);
                }
                if (plan.min_rate_lps !== undefined) {
                    setMinRateValue(plan.min_rate_lps);
                }
                if (plan.clk_source !== undefined) {
                    setClockSourceValue(plan.clk_source);
                }
                if (plan.direct_sampling_max_hz !== undefined) {
                    currentDirectSamplingMaxHz = Number(
                        plan.direct_sampling_max_hz,
                    );
                }
                if (plan.direct_sampling !== undefined) {
                    document.getElementById("directSampling").value = String(
                        plan.direct_sampling,
                    );
                    syncDirectSamplingFields(plan.direct_sampling !== 0);
                }
                updateFFTInfo(plan);

                zoomLeft = 0;
                zoomRight = 1;
                pendingViewChange = false;
                if (clearOnViewChange && viewChanged)
                    scheduleCurrentViewRedraw();
                if (hasFrequencyWindow() && currentSteps) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                    document.getElementById("infoRange").textContent =
                        formatScanRange(currentFreq0, currentFreq1);
                    saveVisibleView();
                }
            }

            function scheduleViewUpdate(
                visibleStart,
                visibleEnd,
                visibleChanged,
            ) {
                if (!backendOnline || !scanRunning) return;
                if (!hasFrequencyWindow(visibleStart, visibleEnd)) return;

                pendingView = {
                    visible_start_hz: visibleStart,
                    visible_end_hz: visibleEnd,
                    display_bins: displayBins(),
                    visible_changed: !!visibleChanged,
                };
                if (viewUpdateTimer) clearTimeout(viewUpdateTimer);
                viewUpdateTimer = setTimeout(sendViewUpdate, 220);
            }

            async function sendViewUpdate() {
                const request = pendingView;
                if (!request) return;
                pendingView = null;
                viewUpdateTimer = null;

                const serial = ++viewRequestSerial;
                const result = await apiPost("/api/view", {
                    visible_start_hz: request.visible_start_hz,
                    visible_end_hz: request.visible_end_hz,
                    display_bins: request.display_bins,
                    view_id: currentViewId,
                });
                if (serial !== viewRequestSerial) return;

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    applyViewPlan(result, request.visible_changed);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else {
                    pendingViewChange = false;
                    updateUI(false, true);
                }
            }

            function sampleRateLabel(rate) {
                const mhz = rate / 1e6;
                const text = Number.isInteger(mhz)
                    ? mhz.toFixed(0)
                    : mhz.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
                return text + " MHz";
            }

            function syncSampleRateOptions(rates, selected) {
                const sel = document.getElementById("samplerate");
                const values = Array.isArray(rates)
                    ? [...new Set(rates.map(Number).filter((rate) => rate > 0))]
                    : [];

                if (values.length) {
                    sel.replaceChildren(
                        ...values.map((rate) => {
                            const opt = document.createElement("option");
                            opt.value = String(rate);
                            opt.textContent = sampleRateLabel(rate);
                            return opt;
                        }),
                    );
                }

                if (selected) {
                    const selectedText = String(selected);
                    if (
                        ![...sel.options].some(
                            (opt) => opt.value === selectedText,
                        )
                    ) {
                        const opt = document.createElement("option");
                        opt.value = selectedText;
                        opt.textContent = sampleRateLabel(selected);
                        sel.appendChild(opt);
                    }
                    sel.value = selectedText;
                }
            }

            function setRateLimitValue(value) {
                const idx = clampNumber(
                    nearestRateIndex(value || 20),
                    RATE_LIMIT_MIN_INDEX,
                    RATE_LIMIT_MAX_INDEX,
                );
                document.getElementById("rateLimit").value = String(
                    RATE_VALUES[idx],
                );
                updateRateRangeDisplay();
            }

            function setMinRateValue(value) {
                const idx = clampNumber(
                    nearestRateIndex(value || 0),
                    RATE_MIN_MIN_INDEX,
                    RATE_MIN_MAX_INDEX,
                );
                document.getElementById("minRate").value = String(
                    RATE_VALUES[idx],
                );
                updateRateRangeDisplay();
            }

            function setClockSourceValue(value) {
                document.getElementById("clockIn").checked =
                    Number(value) !== 0;
            }

            function updateScanInfo(plan) {
                const el = document.getElementById("infoScan");
                if (!el || !plan) return;
                const mode = plan.mode || plan.active_mode || "single";
                const steps =
                    plan.steps !== undefined
                        ? Number(plan.steps)
                        : plan.b !== undefined
                          ? Number(plan.b)
                          : 0;
                el.textContent =
                    mode === "scan" && steps >= 2 ? steps + " steps" : "Fixed";
            }

            function updateTrafficInfo(plan) {
                const el = document.getElementById("infoTraffic");
                if (!el || !plan || plan.traffic_kbytes_s === undefined) return;
                const value = Number(plan.traffic_kbytes_s);
                if (!Number.isFinite(value)) return;
                el.textContent =
                    value < 100
                        ? value.toFixed(1) + " kB/s"
                        : Math.round(value) + " kB/s";
            }

            function updateFFTInfo(plan) {
                if (!plan) return;
                updateWaterfallLineRateEstimate(plan);
                const fftInfo = document.getElementById("infoFFT");
                if (!fftInfo) return;
                const fft =
                    plan.effective_fft_size !== undefined
                        ? Number(plan.effective_fft_size)
                        : plan.fft_size !== undefined
                          ? Number(plan.fft_size)
                          : 0;
                const decim =
                    plan.decim_factor !== undefined
                        ? Number(plan.decim_factor)
                        : 1;
                if (!fft) return;
                fftInfo.textContent =
                    decim > 1 ? fft + " x" + decim : String(fft);
                updateScanInfo(plan);
                updateTrafficInfo(plan);
            }

            // ===================================================================
            //  UI
            // ===================================================================
            function updateUI(running, connected = true) {
                backendOnline = connected;
                scanRunning = connected && running;
                document.getElementById("btnStart").disabled = !connected;
                document.getElementById("btnStop").disabled = !scanRunning;
                const dot = document.getElementById("statusDot");
                if (!connected) {
                    dot.className = "status-dot disconnected";
                    document.getElementById("statusText").textContent =
                        "disconnected";
                } else {
                    dot.className =
                        "status-dot " + (running ? "running" : "idle");
                    document.getElementById("statusText").textContent = running
                        ? "scanning"
                        : "idle";
                }
            }

            function mhzInputValue(freq) {
                return (freq / 1e6)
                    .toFixed(6)
                    .replace(/0+$/, "")
                    .replace(/\.$/, "");
            }

            function applyScanPlan(plan) {
                if (!plan) return;

                zoomLeft = 0;
                zoomRight = 1;

                if (plan.configured_start_hz !== undefined)
                    configuredFreq0 = Number(plan.configured_start_hz);
                else if (plan.freq_start !== undefined)
                    configuredFreq0 = Number(plan.freq_start);
                if (plan.configured_end_hz !== undefined)
                    configuredFreq1 = Number(plan.configured_end_hz);
                else if (plan.freq_end !== undefined)
                    configuredFreq1 = Number(plan.freq_end);

                if (Number.isFinite(configuredFreq0)) {
                    document.getElementById("freqStart").value =
                        mhzInputValue(configuredFreq0);
                }
                if (Number.isFinite(configuredFreq1)) {
                    document.getElementById("freqEnd").value =
                        mhzInputValue(configuredFreq1);
                }

                if (plan.visible_start_hz !== undefined)
                    currentFreq0 = Number(plan.visible_start_hz);
                else if (plan.freq_start !== undefined)
                    currentFreq0 = Number(plan.freq_start);
                if (plan.visible_end_hz !== undefined)
                    currentFreq1 = Number(plan.visible_end_hz);
                else if (plan.freq_end !== undefined)
                    currentFreq1 = Number(plan.freq_end);

                if (plan.view_id !== undefined)
                    currentViewId = Number(plan.view_id);
                if (plan.steps !== undefined) {
                    currentSteps = plan.steps;
                }
                if (plan.converter_freq !== undefined) {
                    currentConverterFreq = plan.converter_freq;
                    document.getElementById("converterFreq").value =
                        mhzInputValue(plan.converter_freq);
                }
                if (plan.rate_limit_lps !== undefined) {
                    setRateLimitValue(plan.rate_limit_lps);
                }
                if (plan.min_rate_lps !== undefined) {
                    setMinRateValue(plan.min_rate_lps);
                }
                if (plan.clk_source !== undefined) {
                    setClockSourceValue(plan.clk_source);
                }
                if (plan.direct_sampling_max_hz !== undefined) {
                    currentDirectSamplingMaxHz = Number(
                        plan.direct_sampling_max_hz,
                    );
                }
                if (plan.direct_sampling !== undefined) {
                    document.getElementById("directSampling").value = String(
                        plan.direct_sampling,
                    );
                    syncDirectSamplingFields(plan.direct_sampling !== 0);
                }
                updateFFTInfo(plan);
                if (hasFrequencyWindow()) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                    document.getElementById("infoRange").textContent =
                        formatScanRange(currentFreq0, currentFreq1);
                    saveVisibleView();
                }
            }

            function buildScanRequest(options = {}) {
                const direct = selectedDirectSampling();
                const directMaxHz = direct ? directSamplingMaxHz() : 0;
                const request = {
                    freq_start: direct
                        ? 0
                        : parseFloat(
                              document.getElementById("freqStart").value,
                          ),
                    freq_end: direct
                        ? directMaxHz / 1e6
                        : parseFloat(document.getElementById("freqEnd").value),
                    converter_freq: direct
                        ? 0
                        : parseFloat(
                              document.getElementById("converterFreq").value,
                          ),
                    samplerate: direct
                        ? 50000000
                        : parseFloat(
                              document.getElementById("samplerate").value,
                          ),
                    bw_ratio: direct
                        ? 1.0
                        : parseFloat(document.getElementById("bwRatio").value),
                    lna_gain: parseInt(
                        document.getElementById("lnaGain").value,
                    ),
                    vga_gain: parseInt(
                        document.getElementById("vgaGain").value,
                    ),
                    direct_sampling: direct,
                    clk_source: document.getElementById("clockIn").checked
                        ? 1
                        : 0,
                    min_rate_lps: parseInt(
                        document.getElementById("minRate").value,
                    ),
                    rate_limit_lps: parseInt(
                        document.getElementById("rateLimit").value,
                    ),
                    display_bins: displayBins(),
                };
                if (options.preserveView && hasFrequencyWindow()) {
                    request.visible_start_hz = currentFreq0;
                    request.visible_end_hz = currentFreq1;
                }
                return request;
            }

            function clearScanDisplay() {
                cancelCurrentViewRedraw();
                linesCount = 0;
                currentBins = null;
                currentBinsFreq0 = 0;
                currentBinsFreq1 = 0;
                wfRows = [];
                clearWaterfallPixels();
                if (wfImageData) wfCtx.putImageData(wfImageData, 0, 0);
            }

            async function startOrRestartScan(options = { resetView: true }) {
                desiredScanRunning = true;
                clearAutoRestartTimer();
                const serial = ++scanRequestSerial;
                viewRequestSerial++;
                pendingView = null;
                pendingViewChange = false;
                if (viewUpdateTimer) {
                    clearTimeout(viewUpdateTimer);
                    viewUpdateTimer = null;
                }
                if (options.resetView !== false) {
                    clearSavedView();
                    if (selectedDirectSampling() !== 0)
                        syncDirectSamplingFields(true);
                    configuredFreq0 =
                        parseFloat(document.getElementById("freqStart").value) *
                        1e6;
                    configuredFreq1 =
                        parseFloat(document.getElementById("freqEnd").value) *
                        1e6;
                    currentFreq0 = configuredFreq0;
                    currentFreq1 = configuredFreq1;
                }
                const result = await apiPost(
                    "/api/start",
                    buildScanRequest(options),
                );
                if (serial !== scanRequestSerial) return result;

                if (!result) {
                    clearAutoRestartTimer();
                    updateUI(false, false);
                    disconnectSSE();
                } else if (result.status === "ok") {
                    applyScanPlan(result);
                    updateUI(true, true);
                    clearScanDisplay();
                    connectSSE();
                } else {
                    if (!options.autoRetry) desiredScanRunning = false;
                    updateUI(false, true);
                    disconnectSSE();
                }
                return result;
            }

            let gainUpdateTimer = null;
            function scheduleGainUpdate() {
                if (gainUpdateTimer) clearTimeout(gainUpdateTimer);
                gainUpdateTimer = setTimeout(async function () {
                    gainUpdateTimer = null;
                    const result = await apiPost("/api/gain", {
                        lna_gain: parseInt(
                            document.getElementById("lnaGain").value,
                        ),
                        vga_gain: parseInt(
                            document.getElementById("vgaGain").value,
                        ),
                    });
                    if (result && result.status === "ok") {
                        document.getElementById("lnaGain").value =
                            result.lna_gain;
                        document.getElementById("lnaVal").textContent =
                            result.lna_gain;
                        document.getElementById("vgaGain").value =
                            result.vga_gain;
                        document.getElementById("vgaVal").textContent =
                            result.vga_gain;
                    }
                }, 80);
            }

            async function updateBackendRateLimit() {
                const result = await apiPost("/api/rate", {
                    rate_limit_lps: parseInt(
                        document.getElementById("rateLimit").value,
                    ),
                });

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    if (result.rate_limit_lps !== undefined)
                        setRateLimitValue(result.rate_limit_lps);
                    if (result.min_rate_lps !== undefined)
                        setMinRateValue(result.min_rate_lps);
                    updateFFTInfo(result);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else {
                    updateUI(false, true);
                }
            }

            async function updateBackendMinRate() {
                const result = await apiPost("/api/min-rate", {
                    min_rate_lps: parseInt(
                        document.getElementById("minRate").value,
                    ),
                });

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    if (result.min_rate_lps !== undefined)
                        setMinRateValue(result.min_rate_lps);
                    updateFFTInfo(result);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else {
                    updateUI(false, true);
                }
            }

            document
                .getElementById("btnStart")
                .addEventListener("click", async function () {
                    await startOrRestartScan();
                });

            document
                .getElementById("btnStop")
                .addEventListener("click", async function () {
                    desiredScanRunning = false;
                    clearAutoRestartTimer();
                    scanRequestSerial++;
                    viewRequestSerial++;
                    pendingView = null;
                    pendingViewChange = false;
                    if (viewUpdateTimer) {
                        clearTimeout(viewUpdateTimer);
                        viewUpdateTimer = null;
                    }
                    const result = await apiPost("/api/stop", {});
                    if (!result) {
                        clearAutoRestartTimer();
                        updateUI(false, false);
                        disconnectSSE();
                    } else if (result.status === "ok") {
                        updateUI(false, true);
                        disconnectSSE();
                    }
                });

            document
                .getElementById("lnaGain")
                .addEventListener("input", function () {
                    document.getElementById("lnaVal").textContent = this.value;
                    scheduleGainUpdate();
                });
            document
                .getElementById("vgaGain")
                .addEventListener("input", function () {
                    document.getElementById("vgaVal").textContent = this.value;
                    scheduleGainUpdate();
                });

            function handleRateSliderInput(changed) {
                const changes = syncRateRangeFromSliders(changed);
                rateMinDirty = rateMinDirty || changes.minChanged;
                rateMaxDirty = rateMaxDirty || changes.maxChanged;
            }

            async function handleRateSliderChange(changed) {
                const changes = syncRateRangeFromSliders(changed);
                const minChanged = changes.minChanged || rateMinDirty;
                const maxChanged = changes.maxChanged || rateMaxDirty;
                rateMinDirty = false;
                rateMaxDirty = false;
                if (minChanged) await updateBackendMinRate();
                if (maxChanged) await updateBackendRateLimit();
            }

            document
                .getElementById("rateMinSlider")
                .addEventListener("input", () =>
                    handleRateSliderInput("min"),
                );
            document
                .getElementById("rateMaxSlider")
                .addEventListener("input", () =>
                    handleRateSliderInput("max"),
                );
            document
                .getElementById("rateMinSlider")
                .addEventListener("change", () =>
                    handleRateSliderChange("min"),
                );
            document
                .getElementById("rateMaxSlider")
                .addEventListener("change", () =>
                    handleRateSliderChange("max"),
                );
            document
                .getElementById("directSampling")
                .addEventListener("change", handleDirectSamplingChanged);
            document
                .getElementById("samplerate")
                .addEventListener("change", handleSamplerateChanged);

            function setWaterfallAuto(enabled) {
                waterfallAuto = !!enabled;
                document.getElementById("wfAuto").checked = waterfallAuto;
                document.getElementById("wfMin").disabled = waterfallAuto;
                document.getElementById("wfMax").disabled = waterfallAuto;
                updateWaterfallLevelDisplay();
                if (!waterfallAuto) {
                    autoWfMin = null;
                    autoWfMax = null;
                }
                localStorage.setItem("wfAuto", waterfallAuto ? "1" : "0");
            }

            function syncWaterfallBrightness(changed) {
                if (waterfallAuto) return;
                const minEl = document.getElementById("wfMin");
                const maxEl = document.getElementById("wfMax");
                let minVal = parseInt(minEl.value, 10);
                let maxVal = parseInt(maxEl.value, 10);

                if (minVal >= maxVal) {
                    if (changed === "min") minVal = Math.max(0, maxVal - 1);
                    else maxVal = Math.min(400, minVal + 1);
                }

                waterfallMin = minVal;
                waterfallMax = maxVal;
                minEl.value = minVal;
                maxEl.value = maxVal;
                updateWaterfallLevelDisplay();
                localStorage.setItem("wfMin", minVal);
                localStorage.setItem("wfMax", maxVal);
                scheduleCurrentViewRedraw();
            }

            document
                .getElementById("wfMin")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("min"),
                );
            document
                .getElementById("wfMax")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("max"),
                );
            document
                .getElementById("wfAuto")
                .addEventListener("change", function () {
                    setWaterfallAuto(this.checked);
                });

            // ===================================================================
            //  Init
            // ===================================================================
            (async function init() {
                const status = await apiGet("/api/status");
                if (status) {
                    document.getElementById("infoHw").textContent =
                        status.hardware || "---";
                    document.getElementById("infoFw").textContent =
                        status.firmware || "---";
                    document.getElementById("infoSn").textContent =
                        status.serial || "---";
                    currentSteps = status.steps || 0;
                    updateFFTInfo(status);
                    configuredFreq0 =
                        status.configured_start_hz || status.freq_start || 0;
                    configuredFreq1 =
                        status.configured_end_hz || status.freq_end || 0;
                    currentFreq0 =
                        status.visible_start_hz || status.freq_start || 0;
                    currentFreq1 =
                        status.visible_end_hz || status.freq_end || 0;
                    const savedView =
                        loadHashViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        ) ||
                        loadSavedViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        );
                    if (savedView) {
                        currentFreq0 = savedView.left;
                        currentFreq1 = savedView.right;
                    }
                    if (status.view_id !== undefined)
                        currentViewId = Number(status.view_id);
                    if (hasFrequencyWindow() && currentSteps)
                        updateFrequencyLabels(
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );
                    if (hasFrequencyWindow())
                        document.getElementById("infoRange").textContent =
                            formatScanRange(currentFreq0, currentFreq1);
                    if (Number.isFinite(configuredFreq0))
                        document.getElementById("freqStart").value =
                            configuredFreq0 / 1e6;
                    if (Number.isFinite(configuredFreq1))
                        document.getElementById("freqEnd").value =
                            configuredFreq1 / 1e6;
                    if (status.converter_freq !== undefined) {
                        currentConverterFreq = status.converter_freq;
                        document.getElementById("converterFreq").value =
                            status.converter_freq / 1e6;
                    }
                    syncSampleRateOptions(
                        status.sample_rates,
                        status.samplerate,
                    );
                    if (status.direct_sampling_max_hz !== undefined) {
                        currentDirectSamplingMaxHz = Number(
                            status.direct_sampling_max_hz,
                        );
                    } else {
                        refreshComputedDirectSamplingMax();
                    }
                    if (status.rate_limit_lps !== undefined) {
                        setRateLimitValue(status.rate_limit_lps);
                    }
                    if (status.min_rate_lps !== undefined) {
                        setMinRateValue(status.min_rate_lps);
                    }
                    if (status.clk_source !== undefined) {
                        setClockSourceValue(status.clk_source);
                    }
                    if (status.bw_ratio !== undefined) {
                        const sel = document.getElementById("bwRatio");
                        for (let opt of sel.options)
                            if (parseFloat(opt.value) === status.bw_ratio) {
                                sel.value = opt.value;
                                break;
                            }
                    }
                    if (status.lna_gain !== undefined) {
                        document.getElementById("lnaGain").value =
                            status.lna_gain;
                        document.getElementById("lnaVal").textContent =
                            status.lna_gain;
                    }
                    if (status.vga_gain !== undefined) {
                        document.getElementById("vgaGain").value =
                            status.vga_gain;
                        document.getElementById("vgaVal").textContent =
                            status.vga_gain;
                    }
                    if (status.direct_sampling !== undefined) {
                        document.getElementById("directSampling").value =
                            status.direct_sampling;
                        syncDirectSamplingFields(status.direct_sampling !== 0);
                    } else {
                        syncDirectSamplingFields(false);
                    }
                }

                /* Restore waterfall brightness from localStorage */
                const savedWfMin = localStorage.getItem("wfMin");
                const savedWfMax = localStorage.getItem("wfMax");
                if (savedWfMin !== null) {
                    document.getElementById("wfMin").value = savedWfMin;
                    waterfallMin = parseInt(savedWfMin, 10);
                }
                if (savedWfMax !== null) {
                    document.getElementById("wfMax").value = savedWfMax;
                    waterfallMax = parseInt(savedWfMax, 10);
                }
                syncWaterfallBrightness("max");
                updateRateRangeDisplay();
                setWaterfallAuto(localStorage.getItem("wfAuto") === "1");

                if (!status) {
                    updateUI(false, false);
                } else if (status.scanning) {
                    updateUI(true, true);
                    clearScanDisplay();
                    scheduleViewUpdate(
                        currentFreq0,
                        currentFreq1,
                        !!loadSavedViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        ),
                    );
                    connectSSE();
                } else {
                    await startOrRestartScan({
                        resetView: false,
                        preserveView: true,
                    });
                }
                loadBands();
                loadMarkers();
                window.setInterval(checkBackendStatus, 2000);
            })();
        </script>
    </body>
</html>
