                    const freq = Number(marker.frequency_hz);
                    if (freq < axis.left || freq > axis.right) continue;
                    const x = ((freq - axis.left) / span) * width;
                    markerHitBoxes.push({ marker, x });

                    scCtx.strokeStyle = "rgba(255, 230, 120, 0.85)";
                    scCtx.lineWidth = 1;
                    scCtx.beginPath();
                    scCtx.moveTo(x, 0);
                    scCtx.lineTo(x, height);
                    scCtx.stroke();

                    scCtx.fillStyle = "#ffd76b";
                    scCtx.beginPath();
                    scCtx.moveTo(x + 1, 4);
                    scCtx.lineTo(x + 12, 8);
                    scCtx.lineTo(x + 1, 12);
                    scCtx.closePath();
                    scCtx.fill();
                    scCtx.fillRect(x, 3, 1, 16);
                }
                scCtx.restore();
            }

            function nearestMarkerAtCanvas(canvas, clientX) {
                if (!hasFrequencyWindow()) return null;
                const freq = frequencyAt(canvas, clientX);
                if (freq === null) return null;
                const rect = canvas.getBoundingClientRect();
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                const toleranceHz =
                    ((axis.right - axis.left) / Math.max(1, rect.width)) * 8;
                let best = null;
                let bestDistance = Infinity;

                if (canvas === scCanvas && markerHitBoxes.length) {
                    const x = clientX - rect.left;
                    for (const hit of markerHitBoxes) {
                        const distancePx = Math.abs(hit.x - x);
                        if (distancePx <= 10 && distancePx < bestDistance) {
                            best = hit.marker;
                            bestDistance = distancePx;
                        }
                    }
                    if (best) return best;
                    bestDistance = Infinity;
                }

                for (const marker of markers) {
                    const distance = Math.abs(marker.frequency_hz - freq);
                    if (distance <= toleranceHz && distance < bestDistance) {
                        best = marker;
                        bestDistance = distance;
                    }
                }
                return best;
            }

            function fillMarkerGroups(selected) {
                const select = document.getElementById("markerGroup");
                const values = [...new Set(["Ungrouped", ...markerGroups])];
                select.replaceChildren(
                    ...values.map((group) => {
                        const option = document.createElement("option");
                        option.value = group;
                        option.textContent = group;
                        return option;
                    }),
                );
                select.value = values.includes(selected)
                    ? selected
                    : "Ungrouped";
            }

            function closeMarkerDialog() {
                markerDialogTarget = null;
                document
                    .getElementById("markerDialog")
                    .classList.remove("open");
            }

            function openMarkerDialog(marker, freq, clientX, clientY) {
                const dialog = document.getElementById("markerDialog");
                markerDialogTarget = marker || null;
                fillMarkerGroups(marker ? marker.group : "Ungrouped");
                document.getElementById("markerName").value = marker
                    ? marker.name
                    : "";
                document.getElementById("markerFreq").value = formatMHzValue(
                    marker ? marker.frequency_hz : freq,
                    6,
                );
                document.getElementById("markerDelete").disabled = !marker;
                dialog.classList.add("open");
                const left = Math.min(window.innerWidth - 280, clientX + 8);
                const top = Math.min(window.innerHeight - 190, clientY + 8);
                dialog.style.left = Math.max(8, left) + "px";
                dialog.style.top = Math.max(8, top) + "px";
                document.getElementById("markerName").focus();
            }

            async function applyMarkerDialog() {
                const name = cleanIniValue(
                    document.getElementById("markerName").value,
                );
                const group =
                    cleanIniValue(
                        document.getElementById("markerGroup").value,
                    ) || "Ungrouped";
                const freqHz =
                    Number(document.getElementById("markerFreq").value) * 1e6;
                if (!name || !Number.isFinite(freqHz) || freqHz < 0) return;
                if (!markerGroups.includes(group)) markerGroups.push(group);
                if (markerDialogTarget) {
                    markerDialogTarget.name = name;
                    markerDialogTarget.group = group;
                    markerDialogTarget.frequency_hz = freqHz;
                } else {
                    markers.push({
                        id: Date.now(),
                        name,
                        group,
                        frequency_hz: freqHz,
                    });
                }
                updateMarkerCount();
                closeMarkerDialog();
                await saveMarkers();
                if (currentBins && currentBins.length)
                    drawScope(
                        currentBins,
                        currentSourceStart(),
                        currentSourceEnd(),
                        currentSteps,
                    );
            }

            async function deleteMarkerDialog() {
                if (!markerDialogTarget) return;
                markers = markers.filter(
                    (marker) => marker !== markerDialogTarget,
                );
                updateMarkerCount();
                closeMarkerDialog();
                await saveMarkers();
                if (currentBins && currentBins.length)
                    drawScope(
                        currentBins,
                        currentSourceStart(),
                        currentSourceEnd(),
                        currentSteps,
                    );
            }

            function stopMarkerMouseEvent(evt) {
                evt.preventDefault();
                evt.stopPropagation();
                if (typeof evt.stopImmediatePropagation === "function")
                    evt.stopImmediatePropagation();
            }

            function openMarkerDialogFromEvent(canvas, evt) {
                stopMarkerMouseEvent(evt);
                const freq = frequencyAt(canvas, evt.clientX);
                if (freq === null) return false;
                const marker = nearestMarkerAtCanvas(canvas, evt.clientX);
                openMarkerDialog(marker, freq, evt.clientX, evt.clientY);
                return true;
            }

            function handleMarkerMouseDown(canvas, evt) {
                const shiftLeftClick = evt.shiftKey && evt.button === 0;
                const modifiedRightClick =
                    evt.button === 2 &&
                    !evt.shiftKey &&
                    (evt.ctrlKey || evt.altKey || evt.metaKey);
                if (!shiftLeftClick && !modifiedRightClick) return;
                if (openMarkerDialogFromEvent(canvas, evt))
                    markerContextSuppressUntil = Date.now() + 1000;
            }

            function handleMarkerContextMenu(canvas, evt) {
                if (Date.now() < markerContextSuppressUntil) {
                    stopMarkerMouseEvent(evt);
                    return;
                }
                if (
                    evt.shiftKey ||
                    evt.button !== 2 ||
                    !(evt.ctrlKey || evt.altKey || evt.metaKey)
                ) {
                    return;
                }
                openMarkerDialogFromEvent(canvas, evt);
            }

            function handleMarkerAuxClick(canvas, evt) {
                if (evt.button !== 2) return;
                if (evt.shiftKey || Date.now() < markerContextSuppressUntil)
                    stopMarkerMouseEvent(evt);
            }

            function subdivisionCountForStep(step) {
                if (step <= 0) return 0;
                const pow = Math.pow(10, Math.floor(Math.log10(step)));
                const lead = step / pow;
                return Math.abs(lead - 5) < 1e-9 ? 5 : 10;
            }

            function tickKey(freq) {
                return Math.round(freq * 1000);
            }

            function buildFrequencyMarks(left, right, width) {
                if (right <= left) return [];
                const step = chooseFrequencyStep(left, right, width);
                const marks = [];
                const seen = new Set();
                const eps = step * 1e-9;
                let freq = Math.ceil((left - eps) / step) * step;
                const end = Math.floor((right + eps) / step) * step;
                while (freq <= end + eps && marks.length < TICK_MAX_COUNT) {
                    const pos = ((freq - left) / (right - left)) * 100;
                    marks.push({
                        pos: Math.max(0, Math.min(100, pos)),
                        freq,
                        step,
                        kind: "major",
                    });
                    seen.add(tickKey(freq));
                    freq += step;
                }

                const subdivisions = subdivisionCountForStep(step);
                const minorStep = step / subdivisions;
                for (
                    let major = Math.ceil((left - step - eps) / step) * step;
                    major <= right + step + eps;
                    major += step
                ) {
                    for (let i = 1; i < subdivisions; i++) {
                        const minorFreq = major + minorStep * i;
                        if (minorFreq <= left + eps || minorFreq >= right - eps)
                            continue;
                        const key = tickKey(minorFreq);
                        if (seen.has(key)) continue;
                        seen.add(key);
                        marks.push({
                            pos: ((minorFreq - left) / (right - left)) * 100,
                            freq: minorFreq,
                            step,
                            kind:
                                subdivisions === 10 && i === 5
                                    ? "mid"
                                    : "minor",
                        });
                    }
                }

                return marks.sort((a, b) => {
                    if (a.pos !== b.pos) return a.pos - b.pos;
                    if (a.kind === b.kind) return 0;
                    return a.kind === "major" ? -1 : 1;
                });
            }

            function updateZoomIndicator() {
                const fullSpan = configuredFreq1 - configuredFreq0;
                const viewSpan = currentFreq1 - currentFreq0;
                let zoom = 1;
                if (fullSpan > 0 && viewSpan > 0)
                    zoom = Math.max(1, fullSpan / viewSpan);
                document.getElementById("infoZoom").textContent =
                    zoom < 10 ? zoom.toFixed(2) + "x" : zoom.toFixed(1) + "x";
            }

            function updateFrequencyLabels(freqStart, freqEnd, steps) {
                const overlay = document.getElementById("freqScale");
                const axis = getZoomedFrequencyAxis(
                    freqStart,
                    freqEnd,
                    steps,
                    currentBins ? currentBins.length : 0,
                );
                const ticks = buildFrequencyMarks(
                    axis.left,
                    axis.right,
                    overlay.clientWidth || wfCanvas.width,
                );

                overlay.replaceChildren(
                    ...ticks.map((tick) => {
                        const mark = document.createElement("div");
                        const label = document.createElement("div");
                        mark.className =
                            "wf-tick" +
                            (tick.kind === "major" ? "" : " " + tick.kind);
                        if (tick.pos < 2) mark.classList.add("edge-start");
                        if (tick.pos > 98) mark.classList.add("edge-end");
                        mark.style.left = tick.pos + "%";
                        if (tick.kind === "major") {
                            label.className = "wf-tick-label";
                            label.textContent = formatTickMHz(
                                tick.freq,
                                tick.step,
                            );
                            mark.appendChild(label);
                        }
                        return mark;
                    }),
                );
                updateZoomIndicator();
            }

            function frequencyAt(canvas, clientX) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.max(
                    0,
                    Math.min(rect.width, clientX - rect.left),
                );
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                if (axis.right <= axis.left || rect.width <= 0) return null;
                return axis.left + (x / rect.width) * (axis.right - axis.left);
            }

            function receiverFrequencyFromRadio(freq) {
                if (currentConverterFreq >= 0) {
                    return freq - currentConverterFreq;
                }
                return Math.abs(-currentConverterFreq - freq);
            }

            function percentileFromSorted(values, percentile) {
                if (!values.length) return 0;
                const idx = Math.max(
                    0,
                    Math.min(
                        values.length - 1,
                        Math.floor((values.length - 1) * percentile),
                    ),
                );
                return values[idx];
            }

            function updateAutoWaterfallLevels(data) {
                if (!waterfallAuto || !data || !data.length) return;
                const sampleStep = Math.max(1, Math.floor(data.length / 2048));
                const samples = [];
                for (let i = 0; i < data.length; i += sampleStep)
                    samples.push(data[i] | 0);
                samples.sort((a, b) => a - b);
                const low = percentileFromSorted(samples, 0.08);
                const high = percentileFromSorted(samples, 0.985);
                const targetMin = Math.max(0, Math.min(398, low - 8));
                const autoMaxBase = Math.max(targetMin + 2, high + 18);
                const targetMax = Math.max(
                    targetMin + 2,
                    Math.min(400, Math.round(autoMaxBase * 1.5)),
                );

                if (autoWfMin === null || autoWfMax === null) {
                    autoWfMin = targetMin;
                    autoWfMax = targetMax;
                } else {
                    autoWfMin += (targetMin - autoWfMin) * 0.04;
                    autoWfMax += (targetMax - autoWfMax) * 0.06;
                }

                const nextMin = Math.round(autoWfMin);
                const nextMax = Math.max(nextMin + 1, Math.round(autoWfMax));
                if (nextMin === waterfallMin && nextMax === waterfallMax)
                    return;
                waterfallMin = nextMin;
                waterfallMax = nextMax;
                document.getElementById("wfMin").value = String(nextMin);
                document.getElementById("wfMax").value = String(nextMax);
                updateWaterfallLevelDisplay();
                localStorage.setItem("wfMin", String(nextMin));
                localStorage.setItem("wfMax", String(nextMax));
            }

            function mapWaterfallValue(value) {
                const span = Math.max(1, waterfallMax - waterfallMin);
                const scaled = ((value - waterfallMin) * 255) / span;
                return Math.max(0, Math.min(255, Math.round(scaled)));
            }

            function mapSpectrumValue(value) {
                const span = Math.max(1, waterfallMax - waterfallMin);
                const scaled = (Number(value) - waterfallMin) / span;
                return Math.max(0, Math.min(1, scaled));
            }

            function writeWaterfallPixel(pix, offset, rawValue) {
                const val = mapWaterfallValue(rawValue | 0);
                pix[offset] = colorLUT[val * 3];
                pix[offset + 1] = colorLUT[val * 3 + 1];
                pix[offset + 2] = colorLUT[val * 3 + 2];
                pix[offset + 3] = 255;
            }

            function clearWaterfallPixels() {
                if (!wfImageData) return;
                const pix = wfImageData.data;
                for (let i = 0; i < pix.length; i += 4) {
                    pix[i] = 0;
                    pix[i + 1] = 0;
                    pix[i + 2] = 0;
                    pix[i + 3] = 255;
                }
            }

            function transformWaterfallPixels(
                prevStart,
                prevEnd,
                nextStart,
                nextEnd,
                sourcePixels = null,
            ) {
                if (!wfImageData) return;
                const w = wfImageData.width;
                const h = wfImageData.height;
                const prevSpan = prevEnd - prevStart;
                const nextSpan = nextEnd - nextStart;
                if (w <= 0 || h <= 0 || prevSpan <= 0 || nextSpan <= 0) return;

                const source =
                    sourcePixels &&
                    sourcePixels.length === wfImageData.data.length
                        ? sourcePixels
                        : new Uint8ClampedArray(wfImageData.data);
                const imageData = wfCtx.createImageData(w, h);
                const dest = imageData.data;

                for (let y = 0; y < h; y++) {
                    const rowOffset = y * w * 4;
                    for (let x = 0; x < w; x++) {
                        const freq = nextStart + ((x + 0.5) / w) * nextSpan;
                        const srcX = Math.floor(
                            ((freq - prevStart) / prevSpan) * w,
                        );
                        const dst = rowOffset + x * 4;
                        if (srcX >= 0 && srcX < w) {
                            const src = rowOffset + srcX * 4;
                            dest[dst] = source[src];
                            dest[dst + 1] = source[src + 1];
                            dest[dst + 2] = source[src + 2];
                            dest[dst + 3] = 255;
                        } else {
                            dest[dst] = 0;
                            dest[dst + 1] = 0;
                            dest[dst + 2] = 0;
                            dest[dst + 3] = 255;
                        }
                    }
                }

                wfImageData = imageData;
                wfCtx.putImageData(wfImageData, 0, 0);
            }

            function transformVisibleDisplay(
                prevStart,
                prevEnd,
                nextStart,
                nextEnd,
                sourcePixels = null,
            ) {
                transformWaterfallPixels(
                    prevStart,
                    prevEnd,
                    nextStart,
                    nextEnd,
                    sourcePixels,
                );
                if (currentBins && currentBins.length) {
                    drawScope(
                        currentBins,
                        currentSourceStart(prevStart),
                        currentSourceEnd(prevEnd),
                        currentSteps,
                    );
                }
            }

            function redrawWaterfallHistory(renderToken) {
                if (!wfImageData) return;

                const w = wfImageData.width;
                const h = wfImageData.height;
                const imageData = wfCtx.createImageData(w, h);
                const pix = imageData.data;
                const rows = Math.min(wfRows.length, h);
                const sourceRows = wfRows.slice(0, rows);
                let y = 0;
                let cachedRanges = null;
                let cachedBinCount = 0;

                waterfallRenderActiveToken = renderToken;

                function finishRender() {
                    if (waterfallRenderActiveToken === renderToken) {
                        waterfallRenderActiveToken = 0;
                    }
                }

                function drawChunk() {
                    if (renderToken !== waterfallRenderToken || !wfImageData) {
                        finishRender();
                        return;
                    }

                    const stop = Math.min(rows, y + WF_REDRAW_ROWS_PER_FRAME);
                    for (; y < stop; y++) {
                        const row = sourceRows[y];
                        const rowData = row.data || row;
                        const n = rowData.length;
                        if (!n) continue;
                        const rowHasWindow = hasFrequencyWindow(row.f0, row.f1);
                        const sourceStart = rowHasWindow
                            ? row.f0
                            : currentFreq0;
                        const sourceEnd = rowHasWindow ? row.f1 : currentFreq1;
                        const targetAxis = getZoomedFrequencyAxis(
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                            n,
                        );
                        const sameAxis = sameFrequencySpan(
                            targetAxis.left,
                            targetAxis.right,
                            sourceStart,
                            sourceEnd,
                        );
                        if (
                            sameAxis &&
                            n !== w &&
                            (!cachedRanges || cachedBinCount !== n)
                        ) {
                            cachedBinCount = n;
                            cachedRanges = getCanvasBinRanges(
                                w,
                                n,
                                clampZoomRange(n),
                            );
                        }
                        const rowOffset = y * w * 4;
                        for (let x = 0; x < w; x++) {
                            const value =
                                sameAxis && n === w
                                    ? rowData[x]
                                    : sameAxis
                                      ? dataPeakForBinRange(
                                            rowData,
                                            cachedRanges.first[x],
                                            cachedRanges.last[x],
                                        )
                                      : dataPeakForAxis(
                                            rowData,
                                            x,
                                            w,
                                            targetAxis,
                                            sourceStart,
                                            sourceEnd,
                                        );
                            writeWaterfallPixel(pix, rowOffset + x * 4, value);
                        }
                    }

                    if (y < rows) {
                        requestAnimationFrame(drawChunk);
                        return;
                    }

                    if (
                        renderToken === waterfallRenderToken &&
                        wfImageData &&
                        wfImageData.width === w &&
                        wfImageData.height === h
                    ) {
                        wfImageData = imageData;
                        wfCtx.putImageData(wfImageData, 0, 0);
                    }
                    finishRender();
                }

                drawChunk();
            }

            function drawWaterfallLine(data, freqStart, freqEnd, steps) {
                if (!wfImageData) return;
                const wasRendering = waterfallRenderActiveToken !== 0;
                waterfallRenderToken++;
                updateAutoWaterfallLevels(data);

                const pix = wfImageData.data;
                const w = wfImageData.width;

                wfRows.unshift({ data, f0: freqStart, f1: freqEnd });
                trimWaterfallHistory(data.length);

                // Scroll down by 1 pixel; newest scan line is written at the top.
                pix.copyWithin(4 * w, 0, 4 * w * (wfImageData.height - 1));

                const topRow = 0;

                // Map data bins to canvas pixels
                const n = data.length;
                const targetAxis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    steps,
                    n,
                );
                const sameAxis = sameFrequencySpan(
                    targetAxis.left,
                    targetAxis.right,
                    freqStart,
                    freqEnd,
                );
                const range = sameAxis ? clampZoomRange(n) : null;
                const binRanges =
                    sameAxis && n !== w
                        ? getCanvasBinRanges(w, n, range)
                        : null;
                for (let x = 0; x < w; x++) {
                    const bi = topRow + x * 4;
                    const value =
                        sameAxis && n === w
                            ? data[x]
                            : sameAxis
                              ? dataPeakForBinRange(
                                    data,
                                    binRanges.first[x],
                                    binRanges.last[x],
                                )
                              : dataPeakForAxis(
                                    data,
                                    x,
                                    w,
                                    targetAxis,
                                    freqStart,
                                    freqEnd,
                                );
                    writeWaterfallPixel(pix, bi, value);
                }

                wfCtx.putImageData(wfImageData, 0, 0);

                // Update frequency labels
                updateFrequencyLabels(currentFreq0, currentFreq1, steps);
                if (wasRendering) scheduleCurrentViewRedraw();
            }

            // ===================================================================
            //  Draw spectrum scope (most recent line)
            // ===================================================================
            const scopeHistory = [];

            function drawScope(data, freqStart, freqEnd, steps) {
                const w = scCanvas.width;
                const h = scCanvas.height;
                scCtx.fillStyle = "#000";
                scCtx.fillRect(0, 0, w, h);

                const n = data.length;
                if (n < 2) return;

                const targetAxis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    steps,
                    n,
                );
                drawBandIndicators(targetAxis, w, h);

                // Grid lines
                scCtx.strokeStyle = "#1a2030";
                scCtx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    const y = h * 0.2 * i;
                    scCtx.beginPath();
                    scCtx.moveTo(0, y);
                    scCtx.lineTo(w, y);
                    scCtx.stroke();
                }

                // Draw the spectrum with the same min/max level window as the waterfall.
                scCtx.strokeStyle = "#40c0a0";
                scCtx.lineWidth = 1.5;
                scCtx.beginPath();
                const sameAxis = sameFrequencySpan(
                    targetAxis.left,
                    targetAxis.right,
                    freqStart,
                    freqEnd,
                );
                const range = sameAxis ? clampZoomRange(n) : null;
                const binRanges =
                    sameAxis && n !== w
                        ? getCanvasBinRanges(w, n, range)
                        : null;
                for (let x = 0; x < w; x++) {
                    const rawValue =
                        sameAxis && n === w
                            ? data[x]
                            : sameAxis
                              ? dataPeakForBinRange(
                                    data,
                                    binRanges.first[x],
                                    binRanges.last[x],
                                )
                              : dataPeakForAxis(
                                    data,
                                    x,
                                    w,
                                    targetAxis,
                                    freqStart,
                                    freqEnd,
                                );
                    const v = mapSpectrumValue(rawValue);
                    const y = h - 5 - v * (h - 10);
                    if (x === 0) scCtx.moveTo(x, y);
                    else scCtx.lineTo(x, y);
                }
                scCtx.stroke();
                drawMarkers(targetAxis, w, h);

                // Peak dot
                let maxVal = 0,
                    maxX = 0;
                const sourceStart = Math.max(freqStart, targetAxis.left);
                const sourceEnd = Math.min(freqEnd, targetAxis.right);
                if (sourceEnd <= sourceStart) return;
                const sourceSpan = Math.max(1, freqEnd - freqStart);
                const firstBin = Math.max(
                    0,
                    Math.min(
                        n - 1,
                        Math.floor(
                            ((sourceStart - freqStart) / sourceSpan) * n,
                        ),
                    ),
                );
                const lastBin = Math.min(
                    n,
                    Math.max(
                        firstBin + 1,
                        Math.ceil(((sourceEnd - freqStart) / sourceSpan) * n),
                    ),
                );
                for (let i = firstBin; i < lastBin; i++) {
                    if (data[i] > maxVal) {
                        maxVal = data[i];
                        maxX = i;
                    }
                }
                const maxFreq = freqStart + ((maxX + 0.5) / n) * sourceSpan;
                const px =
                    ((maxFreq - targetAxis.left) /
                        Math.max(1, targetAxis.right - targetAxis.left)) *
                    w;
                const py = h - 5 - mapSpectrumValue(maxVal) * (h - 10);
                scCtx.fillStyle = "#ff8040";
                scCtx.beginPath();
                scCtx.arc(px, py, 3, 0, 2 * Math.PI);
                scCtx.fill();
            }

            // ===================================================================
            //  SSE connection
            // ===================================================================
            let eventSource = null;

            function parseLineEventPayload(raw) {
                let data;
                try {
                    data = JSON.parse(raw);
                } catch (e) {
                    return null;
                }
                if (!data || !Array.isArray(data.d)) return null;
                const expectedBins = Number(data.display_bins || data.d.length);
                if (
                    !Number.isInteger(expectedBins) ||
                    expectedBins <= 0 ||
                    data.d.length !== expectedBins
                ) {
                    return null;
                }
                if (expectedBins !== displayBins()) {
                    scheduleViewUpdate(currentFreq0, currentFreq1, false);
                    return null;
                }
                for (let i = 0; i < data.d.length; i++) {
                    const v = Number(data.d[i]);
                    if (!Number.isInteger(v) || v < 0 || v > 255) return null;
                    data.d[i] = v;
                }
                if (
                    data.f0 !== undefined &&
                    data.f1 !== undefined &&
                    (!Number.isFinite(Number(data.f0)) ||
                        !Number.isFinite(Number(data.f1)) ||
                        Number(data.f1) <= Number(data.f0))
                ) {
                    return null;
                }
                return data;
            }

            function scheduleSSEReconnect() {
                if (!backendOnline || !scanRunning || sseReconnectTimer) return;
                const delay = Math.min(5000, 500 * Math.max(1, ++sseFailureCount));
                sseReconnectTimer = setTimeout(() => {
                    sseReconnectTimer = 0;
                    if (backendOnline && scanRunning && !eventSource)
                        connectSSE();
                }, delay);
            }

            function connectSSE() {
                if (eventSource) eventSource.close();
                sseOpenMs = performance.now();
                lastSseLineMs = 0;
                eventSource = new EventSource("/api/waterfall");

                eventSource.addEventListener("line", function (e) {
                    const data = parseLineEventPayload(e.data);
                    if (!data) return;
                    try {
                        const bins = Uint8Array.from(data.d);
                        const rowView =
                            data.view !== undefined
                                ? Number(data.view)
                                : currentViewId;
                        if (pendingViewChange && rowView === currentViewId)
                            return;
                        if (
                            currentViewId &&
                            rowView &&
                            rowView !== currentViewId
                        ) {
                            if (rowView < currentViewId) return;
                            currentViewId = rowView;
                        }
                        if (!currentViewId && rowView) currentViewId = rowView;
                        if (data.full_f0 !== undefined)
                            configuredFreq0 = Number(data.full_f0);
                        if (data.full_f1 !== undefined)
                            configuredFreq1 = Number(data.full_f1);
                        if (data.f0 !== undefined)
                            currentFreq0 = Number(data.f0);
                        if (data.f1 !== undefined)
                            currentFreq1 = Number(data.f1);
                        if (data.b) currentSteps = data.b;
                        updateFFTInfo(data);
                        zoomLeft = 0;
                        zoomRight = 1;
                        pendingViewChange = false;
                        currentBins = bins;
                        currentBinsFreq0 = currentFreq0;
                        currentBinsFreq1 = currentFreq1;
                        recordWaterfallLineArrival();

                        drawWaterfallLine(
                            bins,
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );
                        drawScope(
                            bins,
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );

                        document.getElementById("infoRange").textContent =
                            formatScanRange(currentFreq0, currentFreq1);
                        saveVisibleView();
                    } catch (e) {
                        console.warn("Ignored invalid waterfall line", e);
                    }
                });

                eventSource.onopen = function () {
                    sseFailureCount = 0;
                };

                eventSource.onerror = function () {
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    checkBackendStatus();
                    scheduleSSEReconnect();
                };
            }

            function disconnectSSE() {
                if (sseReconnectTimer) {
                    clearTimeout(sseReconnectTimer);
                    sseReconnectTimer = 0;
                }
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
                sseOpenMs = 0;
                lastSseLineMs = 0;
            }

            function ensureSSEReceiving() {
                if (!backendOnline || !scanRunning) return;
                if (!eventSource) {
                    connectSSE();
                    return;
                }
                if (
                    eventSource.readyState === EventSource.CLOSED ||
                    eventSource.readyState === 2
                ) {
                    disconnectSSE();
                    connectSSE();
                    return;
                }

                const referenceMs = lastSseLineMs || sseOpenMs;
                if (
                    referenceMs > 0 &&
                    performance.now() - referenceMs > sseStallTimeoutMs()
                ) {
                    disconnectSSE();
                    connectSSE();
                }
            }

            function clearAutoRestartTimer() {
                if (autoRestartTimer) {
                    clearTimeout(autoRestartTimer);
                    autoRestartTimer = 0;
                }
            }

            function statusDevicePresent(status) {
                if (!status || status.device_present === undefined)
                    return true;
                return !!Number(status.device_present);
            }

            function scheduleDesiredScanRestart(status) {
                if (!desiredScanRunning || autoRestartTimer || autoRestartInFlight)
                    return;
                if (!backendOnline || scanRunning || !statusDevicePresent(status))
                    return;

                autoRestartTimer = setTimeout(async () => {
                    autoRestartTimer = 0;
                    if (
                        !desiredScanRunning ||
                        autoRestartInFlight ||
                        scanRunning ||
                        !backendOnline
                    ) {
                        return;
                    }
                    autoRestartInFlight = true;
                    try {
                        await startOrRestartScan({
                            resetView: false,
                            preserveView: true,
                            autoRetry: true,
                        });
                    } finally {
                        autoRestartInFlight = false;
                    }
                }, AUTO_RESTART_DELAY_MS);
            }

            async function checkBackendStatus() {
                if (statusPollInFlight) return null;
                statusPollInFlight = true;
                let status = null;
                try {
                    status = await apiGet("/api/status");
                } finally {
                    statusPollInFlight = false;
                }

                if (!status) {
                    clearAutoRestartTimer();
                    updateUI(false, false);
                    disconnectSSE();
                    return null;
                }

                updateUI(!!status.scanning, true);
                if (status.view_id !== undefined)
                    currentViewId = Number(status.view_id);
                if (status.configured_start_hz !== undefined)
                    configuredFreq0 = Number(status.configured_start_hz);
                if (status.configured_end_hz !== undefined)
                    configuredFreq1 = Number(status.configured_end_hz);
                if (status.visible_start_hz !== undefined)
                    currentFreq0 = Number(status.visible_start_hz);
                if (status.visible_end_hz !== undefined)
                    currentFreq1 = Number(status.visible_end_hz);
                updateFFTInfo(status);
                if (status.scanning) {
                    clearAutoRestartTimer();
                    if (Number(status.display_bins) !== displayBins())
                        scheduleViewUpdate(currentFreq0, currentFreq1, false);
                    ensureSSEReceiving();
                } else {
                    disconnectSSE();
                    scheduleDesiredScanRestart(status);
                }
                return status;
            }

            // ===================================================================
            //  Hover readout
            // ===================================================================
            const hoverReadout = document.getElementById("hoverReadout");

            function showHoverReadout(canvas, evt, includeLevel) {
                if (rulerActive) return;
                if (panActive) {
                    hoverReadout.style.display = "none";
                    return;
                }
                if (!hasFrequencyWindow()) {
                    hoverReadout.style.display = "none";
                    return;
                }

                const freq = frequencyAt(canvas, evt.clientX);
                if (freq === null) {
                    hoverReadout.style.display = "none";
                    return;
                }

                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                const decimals = decimalsForSpan(axis.right - axis.left);
                const lines = [];
                const marker = nearestMarkerAtCanvas(canvas, evt.clientX);
                if (marker)
                    lines.push(
                        marker.name +
                            " (" +
                            (marker.group || "Ungrouped") +
                            ")",
                    );
                const bandNames = bandsAtFrequency(freq);
                if (bandNames.length) lines.push(bandNames.join(", "));
                if (currentConverterFreq !== 0) {
                    lines.push("RF: " + formatMHz(freq, decimals));
                    lines.push(
                        "RX: " +
                            formatMHz(
                                receiverFrequencyFromRadio(freq),
                                decimals,
                            ),
                    );
                } else {
                    lines.push(formatMHz(freq, decimals));
                }
                if (includeLevel && currentBins && currentBins.length) {
                    const rect = canvas.getBoundingClientRect();
                    const x = Math.max(
                        0,
                        Math.min(rect.width - 1, evt.clientX - rect.left),
                    );
                    const level = dataPeakForAxis(
                        currentBins,
                        x,
                        rect.width,
                        axis,
                        currentSourceStart(),
                        currentSourceEnd(),
                    );
                    lines.push("Level: " + String(level));
                }

                hoverReadout.textContent = lines.join("\n");
                hoverReadout.style.left = evt.clientX + 12 + "px";
                hoverReadout.style.top = evt.clientY + 12 + "px";
                hoverReadout.style.display = "block";
            }

            function hideHoverReadout() {
                hoverReadout.style.display = "none";
            }

            function waterfallPointFromEvent(evt) {
                const rect = wfCanvas.getBoundingClientRect();
                if (rect.width <= 0 || rect.height <= 0) return null;
                return {
                    x: clampNumber(
                        ((evt.clientX - rect.left) / rect.width) *
                            wfCanvas.width,
                        0,
                        wfCanvas.width,
                    ),
                    y: clampNumber(
                        ((evt.clientY - rect.top) / rect.height) *
                            wfCanvas.height,
                        0,
                        wfCanvas.height,
                    ),
                };
            }

            function frequencyAtWaterfallX(x) {
                if (!hasFrequencyWindow()) return null;
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : displayBins(),
                );
                if (axis.right <= axis.left || wfCanvas.width <= 0)
                    return null;
                const frac = clampNumber(x / wfCanvas.width, 0, 1);
                return axis.left + frac * (axis.right - axis.left);
            }

            function rulerText() {
                if (!rulerStart || !rulerEnd) return "";
                const f0 = frequencyAtWaterfallX(rulerStart.x);
                const f1 = frequencyAtWaterfallX(rulerEnd.x);
                const secondsPerLine = estimateWaterfallSecondsPerLine();
                const seconds =
                    Math.abs(rulerEnd.y - rulerStart.y) * secondsPerLine;
                const frequencyText =
                    f0 === null || f1 === null
                        ? "--"
                        : formatFrequencyDistance(f1 - f0);
                return (
                    "Distance: " +
                    frequencyText +
                    "\nTime: " +
                    formatSecondsDistance(seconds)
                );
            }

            function drawRulerOverlay() {
                clearRulerOverlay();
                if (!rulerActive || !rulerStart || !rulerEnd) return;

                rulerCtx.save();
                rulerCtx.lineWidth = 2;
                rulerCtx.setLineDash([8, 8]);
                rulerCtx.strokeStyle = "rgba(255, 255, 255, 0.95)";
                rulerCtx.beginPath();
                rulerCtx.moveTo(rulerStart.x, rulerStart.y);
                rulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                rulerCtx.stroke();
                rulerCtx.lineDashOffset = 8;
                rulerCtx.strokeStyle = "rgba(0, 0, 0, 0.95)";
                rulerCtx.beginPath();
                rulerCtx.moveTo(rulerStart.x, rulerStart.y);
                rulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                rulerCtx.stroke();
                rulerCtx.lineDashOffset = 0;

                rulerCtx.setLineDash([]);
                rulerCtx.fillStyle = "rgba(64, 160, 224, 0.9)";
                rulerCtx.strokeStyle = "rgba(5, 8, 12, 0.9)";
                for (const point of [rulerStart, rulerEnd]) {
                    rulerCtx.beginPath();
                    rulerCtx.arc(point.x, point.y, 3.5, 0, Math.PI * 2);
                    rulerCtx.fill();
                    rulerCtx.stroke();
                }
                rulerCtx.restore();
            }

            function applyZoomStepsAtCursor(canvas, clientX, signedSteps) {
                if (!canvas || !hasFrequencyWindow()) return;

                const rect = canvas.getBoundingClientRect();
                if (rect.width <= 0) return;
                if (!Number.isFinite(signedSteps) || signedSteps === 0) return;

                const cursor = Math.max(
                    0,
                    Math.min(1, (clientX - rect.left) / rect.width),
                );
                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                const fullSpan = fullEnd - fullStart;
                if (fullSpan <= 0) return;

                const currentSpan = currentFreq1 - currentFreq0;
                const anchor = currentFreq0 + cursor * currentSpan;
                const steps = Math.max(1, Math.min(8, Math.abs(signedSteps)));
                const factorPerStep = 1.18;
                const factor =
                    signedSteps < 0
                        ? Math.pow(1 / factorPerStep, steps)
                        : Math.pow(factorPerStep, steps);
                const minSpan = Math.max(1, fullSpan / MAX_ZOOM_FACTOR);
                let span = Math.max(
                    minSpan,
                    Math.min(fullSpan, currentSpan * factor),
                );
                let left = anchor - cursor * span;
                let right = left + span;

                if (left < fullStart) {
                    right += fullStart - left;
                    left = fullStart;
                }
                if (right > fullEnd) {
                    left -= right - fullEnd;
                    right = fullEnd;
                }
                left = Math.max(fullStart, left);
                right = Math.min(fullEnd, right);
                if (right <= left) return;

                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                zoomLeft = 0;
                zoomRight = 1;
                currentFreq0 = left;
                currentFreq1 = right;
                pendingViewChange = true;
                binRangeCache = null;
                transformVisibleDisplay(
                    prevFreq0,
                    prevFreq1,
                    currentFreq0,
                    currentFreq1,
                );
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(left, right, true);
            }

            function wheelZoomStep(evt) {
                const delta = evt.deltaY;
                if (!Number.isFinite(delta) || delta === 0) return 0;

                let unit = 80;
                if (evt.deltaMode === WheelEvent.DOM_DELTA_LINE) unit = 3;
                else if (evt.deltaMode === WheelEvent.DOM_DELTA_PAGE) unit = 1;

                const steps = Math.max(
                    1,
                    Math.min(4, Math.round(Math.abs(delta) / unit)),
                );
                return (delta < 0 ? -1 : 1) * steps;
            }

            function applyVisibleWindow(left, right) {
                if (!hasFrequencyWindow()) return;
                hideHoverReadout();
                const full = primaryFrequencyWindow();
                const clamped = clampVisibleWindow(
                    left,
                    right,
                    full.left,
                    full.right,
                );
                if (!clamped) return;
                if (
                    Math.abs(clamped.left - currentFreq0) < 1 &&
                    Math.abs(clamped.right - currentFreq1) < 1
                ) {
                    return;
                }
                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                zoomLeft = 0;
                zoomRight = 1;
                currentFreq0 = clamped.left;
                currentFreq1 = clamped.right;
                pendingViewChange = true;
                binRangeCache = null;
                transformVisibleDisplay(
                    prevFreq0,
                    prevFreq1,
                    currentFreq0,
                    currentFreq1,
                );
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(currentFreq0, currentFreq1, true);
            }

            function zoomByFactor(factor, anchorFraction = 0.5) {
                if (!hasFrequencyWindow()) return;
                const full = primaryFrequencyWindow();
                const fullSpan = full.right - full.left;
                const currentSpan = currentFreq1 - currentFreq0;
                const minSpan = Math.max(1, fullSpan / MAX_ZOOM_FACTOR);
                const span = Math.max(
                    minSpan,
                    Math.min(fullSpan, currentSpan * factor),
                );
                const anchor = currentFreq0 + currentSpan * anchorFraction;
                applyVisibleWindow(
                    anchor - span * anchorFraction,
                    anchor + span * (1 - anchorFraction),
                );
            }

            function panByFraction(fraction) {
                if (!hasFrequencyWindow()) return;
                const span = currentFreq1 - currentFreq0;
                const delta = span * fraction;
                applyVisibleWindow(currentFreq0 + delta, currentFreq1 + delta);
            }

            function resetZoomView() {
                const full = primaryFrequencyWindow();
                applyVisibleWindow(full.left, full.right);
            }

            function flushZoomWheel() {
                const canvas = zoomWheelCanvas;
                const clientX = zoomWheelClientX;
                const signedSteps =
                    zoomWheelDirection *
                    Math.max(1, Math.min(8, zoomWheelSteps));
                zoomWheelFrame = 0;
                zoomWheelSteps = 0;
                zoomWheelDirection = 0;
                zoomWheelCanvas = null;
                if (signedSteps !== 0)
                    applyZoomStepsAtCursor(canvas, clientX, signedSteps);
            }

            function handleZoomWheel(evt) {
                if (!evt.shiftKey || !hasFrequencyWindow()) {
                    return;
                }

                evt.preventDefault();
                const signedStep = wheelZoomStep(evt);
                if (signedStep === 0) return;
                const direction = signedStep < 0 ? -1 : 1;
                if (
                    zoomWheelFrame &&
                    zoomWheelDirection &&
                    direction !== zoomWheelDirection
                )
                    return;
                zoomWheelDirection = direction;
                zoomWheelSteps = Math.min(
                    8,
                    zoomWheelSteps + Math.abs(signedStep),
                );
                zoomWheelCanvas = evt.currentTarget;
                zoomWheelClientX = evt.clientX;
                if (!zoomWheelFrame)
                    zoomWheelFrame = requestAnimationFrame(flushZoomWheel);
            }

            function setPanningCursor(active) {
                document.body.classList.toggle("panning-mode", active);
            }

            function clampPanWindow(left, right) {
                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                const fullSpan = fullEnd - fullStart;
                const span = right - left;

                if (fullSpan <= 0 || span >= fullSpan) {
                    return { left: fullStart, right: fullEnd };
                }
                if (left < fullStart) {
                    right += fullStart - left;
                    left = fullStart;
                }
                if (right > fullEnd) {
                    left -= right - fullEnd;
                    right = fullEnd;
                }
                return {
                    left: Math.max(fullStart, left),
                    right: Math.min(fullEnd, right),
                };
            }

            function startPan(evt) {
                if (evt.button !== 0 || evt.shiftKey || evt.ctrlKey) return;
                if (!hasFrequencyWindow()) return;
                hideHoverReadout();

                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                if (currentFreq1 - currentFreq0 >= fullEnd - fullStart) return;

                cancelCurrentViewRedraw();
                capturePanPreviewBase();
                panActive = true;
                panStartX = evt.clientX;
                panStartFreq0 = currentFreq0;
                panStartFreq1 = currentFreq1;
                setPanningCursor(true);
                wfCanvas.setPointerCapture(evt.pointerId);
                evt.preventDefault();
            }

            function movePan(evt) {
                if (!panActive) return;
                const rect = wfCanvas.getBoundingClientRect();
                const width = rect.width;
                if (width <= 0) return;

                const span = panStartFreq1 - panStartFreq0;
                const dx = evt.clientX - panStartX;
                const deltaFreq = -(dx / width) * span;
                const clamped = clampPanWindow(
                    panStartFreq0 + deltaFreq,
                    panStartFreq1 + deltaFreq,
                );

                if (
                    Math.abs(clamped.left - currentFreq0) < 1 &&
                    Math.abs(clamped.right - currentFreq1) < 1
                ) {
                    return;
                }

                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                currentFreq0 = clamped.left;
                currentFreq1 = clamped.right;
                pendingViewChange = true;
                binRangeCache = null;
                if (
                    panPreviewBaseData &&
                    wfImageData &&
                    panPreviewBaseWidth === wfImageData.width &&
                    panPreviewBaseHeight === wfImageData.height
                ) {
                    transformVisibleDisplay(
                        panStartFreq0,
                        panStartFreq1,
                        currentFreq0,
                        currentFreq1,
                        panPreviewBaseData,
                    );
                } else {
                    transformVisibleDisplay(
                        prevFreq0,
                        prevFreq1,
                        currentFreq0,
                        currentFreq1,
                    );
                }
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(currentFreq0, currentFreq1, true);
                evt.preventDefault();
            }

            function endPan(evt) {
                if (!panActive) return;
                panActive = false;
                clearPanPreviewBase();
                setPanningCursor(false);
                try {
                    wfCanvas.releasePointerCapture(evt.pointerId);
                } catch (e) {
                    /* pointer capture may already be gone */
                }
                scheduleCurrentViewRedraw();
            }

            function setZoomCursor(active) {
                document.body.classList.toggle("zoom-mode", active);
            }

            function setRulerReadyCursor(active) {
                document.body.classList.toggle("ruler-ready", active);
            }

            function isEditingElement(target) {
                if (!target) return false;
                const tag = target.tagName;
                return (
                    tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA"
                );
            }

            window.addEventListener("keydown", (evt) => {
                const markerDialog = document.getElementById("markerDialog");
                if (
                    evt.key === "Escape" &&
                    markerDialog &&
                    markerDialog.classList.contains("open")
                ) {
                    evt.preventDefault();
                    closeMarkerDialog();
                    return;
                }
                if (evt.key === "Shift") setZoomCursor(true);
                if (evt.key === "Control") setRulerReadyCursor(true);
                if (isEditingElement(evt.target)) return;
                if (evt.key === "+" || evt.key === "=") {
                    evt.preventDefault();
                    zoomByFactor(1 / 1.35);
                } else if (evt.key === "-" || evt.key === "_") {
                    evt.preventDefault();
                    zoomByFactor(1.35);
                } else if (evt.key === "ArrowLeft") {
                    evt.preventDefault();
                    panByFraction(-0.2);
                } else if (evt.key === "ArrowRight") {
                    evt.preventDefault();
                    panByFraction(0.2);
                } else if (evt.key === "0" && !evt.ctrlKey && !evt.metaKey) {
                    evt.preventDefault();
                    resetZoomView();
                }
            });
            window.addEventListener("keyup", (evt) => {
                if (evt.key === "Shift") setZoomCursor(false);
